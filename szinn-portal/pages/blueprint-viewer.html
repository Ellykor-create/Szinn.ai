<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SZINN — Alignment Blueprint</title>
  <link rel="stylesheet" href="/szinn-portal/css/variables.css">
  <link rel="stylesheet" href="/szinn-portal/css/global.css">
  <link rel="stylesheet" href="/szinn-portal/css/nav.css">
  <style>
    .viewer-page {
      padding: 3vh 0 6vh;
    }

    .viewer-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 3vh;
      padding-bottom: 2vh;
      border-bottom: 1px solid var(--border);
    }

    .viewer-back {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.06em;
    }
    .viewer-back:hover { color: var(--gold); }

    .viewer-info {
      text-align: center;
    }
    .viewer-info h2 {
      font-size: 18px;
      font-weight: 400;
    }
    .viewer-info .eyebrow { margin-bottom: 4px; }

    .viewer-actions {
      display: flex;
      gap: 10px;
    }

    /* Blueprint iframe container — de blueprint scrollt binnen dit kader,
       zodat de eigen (sticky) navigatie van de blueprint blijft meelopen. */
    .blueprint-frame-wrapper {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      height: calc(100vh - 190px);
      min-height: 480px;
      position: relative;
    }

    .blueprint-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Loading state */
    .viewer-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      text-align: center;
      color: var(--muted);
      gap: 16px;
    }

    .viewer-loading .spinner-lg {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error state */
    .viewer-error {
      display: none;
      text-align: center;
      padding: 60px 20px;
    }
    .viewer-error.visible { display: block; }
    .viewer-error h3 { margin-bottom: 8px; }
    .viewer-error p { color: var(--muted); font-size: 14px; margin-bottom: 20px; }

    /* PDF download button icon */
    .icon-download::before { content: '↓'; margin-right: 4px; }
    .icon-print::before { content: '⎙'; margin-right: 4px; }

    @media (max-width: 600px) {
      .viewer-toolbar { flex-direction: column; text-align: center; }
      .viewer-actions { justify-content: center; }
    }

    /* Companion in docked-modus: de hele pagina schuift soepel naar links,
       zodat de Companion-drawer (390px, rechts vast) er precies naast past.
       Zo staat de blueprint links en het gesprek erover rechts. */
    body { transition: margin-right .32s cubic-bezier(.22, .61, .36, 1); }
    @media (min-width: 821px) {
      html.szc-docked-open body { margin-right: 390px; }
    }
  </style>
</head>
<body>
  <div id="szinn-nav"></div>

  <main class="container">
    <div class="viewer-page fade-up">
      <div class="viewer-toolbar">
        <a href="/portaal" class="viewer-back">← Terug naar dashboard</a>

        <div class="viewer-info" id="viewer-info">
          <span class="eyebrow">Alignment Blueprint</span>
          <h2 id="viewer-name">Laden…</h2>
        </div>

        <div class="viewer-actions">
          <button class="btn" id="lang-toggle" style="display:none" onclick="toggleLang()" title="Switch language">EN</button>
          <button class="btn" onclick="printBlueprint()" title="Printen">
            <span class="icon-print"></span>Print
          </button>
          <button class="btn btn-primary" id="pdfBtn" onclick="downloadPDF()" title="Download PDF">
            <span class="icon-download"></span>PDF
          </button>
        </div>
      </div>

      <div class="blueprint-frame-wrapper" id="frame-wrapper">
        <div class="viewer-loading" id="viewer-loading">
          <div class="spinner-lg"></div>
          <p>Blueprint laden…</p>
        </div>

        <iframe class="blueprint-frame"
                id="blueprint-frame"
                style="display: none;"
                sandbox="allow-same-origin allow-scripts allow-modals allow-popups allow-downloads"
                title="Alignment Blueprint">
        </iframe>
      </div>

      <div class="viewer-error" id="viewer-error">
        <h3>Blueprint niet gevonden</h3>
        <p>Deze Blueprint is nog niet beschikbaar of het adres is onjuist.</p>
        <a href="/portaal" class="btn btn-primary">Terug naar dashboard</a>
      </div>
    </div>
  </main>

  <div id="szinn-footer"></div>

  <script src="/szinn-portal/js/auth.js"></script>
  <script src="/szinn-portal/js/api.js"></script>
  <script src="/szinn-portal/js/nav.js"></script>
  <!-- Op de blueprint-pagina dockt de Companion naast de blueprint i.p.v. als overlay. -->
  <script>window.SZINN_COMPANION_DOCK = true;</script>
  <script src="/szinn-portal/js/companion-drawer.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('id');
    let lang = params.get('lang') === 'en' ? 'en' : 'nl';
    let currentOrder = null;

    SzinnAuth.requireAuth().then(ok => {
      if (!ok) return;
      SzinnNav.updateUserInfo();
      loadBlueprint();
    });

    async function loadBlueprint() {
      if (!orderId) return showError();

      try {
        const order = await SzinnAPI.getOrder(orderId);

        if (!order || order.status !== 'completed' || !order.blueprintUrl) {
          return showError();
        }
        currentOrder = order;

        document.getElementById('viewer-name').textContent = order.clientName;
        document.title = `SZINN — ${order.clientName} Blueprint`;

        // Taalknop tonen wanneer beide talen beschikbaar zijn
        if ((order.blueprintLanguages || []).includes('en')) {
          document.getElementById('lang-toggle').style.display = '';
          updateLangToggle();
        }

        const frame = document.getElementById('blueprint-frame');
        frame.src = `${order.blueprintUrl}?lang=${lang}`;

        frame.addEventListener('load', () => {
          document.getElementById('viewer-loading').style.display = 'none';
          frame.style.display = 'block';
          // De iframe heeft een vaste hoogte en scrollt intern; daardoor blijft
          // de sticky navigatie van de blueprint in beeld en werkt de scrollspy.
        });

        frame.addEventListener('error', showError);

      } catch (err) {
        showError();
      }
    }

    function showError() {
      document.getElementById('viewer-loading').style.display = 'none';
      document.getElementById('viewer-error').classList.add('visible');
    }

    function printBlueprint() {
      const frame = document.getElementById('blueprint-frame');
      try {
        // Alleen de blueprint zelf printen (zonder portal-omgeving).
        frame.contentWindow.focus();
        frame.contentWindow.print();
      } catch (e) {
        // Laatste redmiddel: open de blueprint los in een nieuw tabblad om te printen.
        const url = `${currentOrder.blueprintUrl}?lang=${lang}`;
        const w = window.open(url, '_blank');
        if (!w) window.print();
      }
    }

    function toggleLang() {
      lang = lang === 'nl' ? 'en' : 'nl';
      updateLangToggle();
      const frame = document.getElementById('blueprint-frame');
      frame.style.display = 'none';
      document.getElementById('viewer-loading').style.display = '';
      frame.src = `${currentOrder.blueprintUrl}?lang=${lang}`;
      const url = new URL(window.location);
      url.searchParams.set('lang', lang);
      history.replaceState(null, '', url);
    }

    function updateLangToggle() {
      document.getElementById('lang-toggle').textContent = lang === 'nl' ? 'EN' : 'NL';
    }

    // Downloadt de PDF direct als bestand — met alle kleuren en afbeeldingen.
    // De server rendert de blueprint-HTML naar een print-PDF (printBackground).
    async function downloadPDF() {
      const btn = document.getElementById('pdfBtn');
      const label = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="icon-download"></span>PDF maken…';
      try {
        const resp = await fetch(`/api/orders/${orderId}/pdf?lang=${lang}`, { credentials: 'same-origin' });
        if (!resp.ok) {
          let msg = 'De PDF kon niet worden gemaakt.';
          try { msg = (await resp.json()).error || msg; } catch (e) {}
          throw new Error(msg);
        }
        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        const name = ((currentOrder && currentOrder.clientName) || 'blueprint').replace(/[^\w\-]+/g, '-');
        const a = document.createElement('a');
        a.href = url;
        a.download = `SZINN-Blueprint-${name}.pdf`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 4000);
      } catch (e) {
        alert(e.message || 'De PDF kon niet worden gemaakt.');
      } finally {
        btn.disabled = false;
        btn.innerHTML = label;
      }
    }
  </script>
</body>
</html>
