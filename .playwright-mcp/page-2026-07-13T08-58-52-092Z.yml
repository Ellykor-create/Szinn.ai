            - heading "De aspecten" [level=3] [ref=f2e287]
            - paragraph [ref=f2e288]: Aspecten zijn de hoeken die planeten met elkaar maken. Ze beschrijven hoe de energieën in jou met elkaar in gesprek zijn. Een conjunctie (0°) is versmelting. Een sextile (60°) is een kans. Een square (90°) is een wrijving die groei creëert. Een trine (120°) is vloeiende ondersteuning. Een oppositie (180°) is een spanning die om balans vraagt.
