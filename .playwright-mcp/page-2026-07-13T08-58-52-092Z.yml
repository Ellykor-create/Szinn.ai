                - generic [ref=f2e226]: "5"
                - text: Waar houd je nog vast aan iets dat eigenlijk af is, en wat zou er ruimte maken als je het losliet?
          - generic [ref=f2e227]:
            - generic [ref=f2e228]: 04 — Astrologie
            - heading "De geboortekaart van Barry" [level=2] [ref=f2e229]:
              - text: De
              - emphasis [ref=f2e230]: geboortekaart
              - text: van Barry
            - paragraph [ref=f2e231]: Placidus huizensysteem · Astronomische ephemeris · Berekend vanuit 30 juni 1971, 08:30 Hoogezand
            - paragraph [ref=f2e232]: Een geboortekaart is geen voorspelling. Het is een energetische vingerafdruk, een snapshot van de hemel op het exacte moment dat jij aankwam op deze aarde, op die specifieke plek. De posities van de planeten op dat moment worden gezien als symbolische krachten die resoneren met wie jij bent en hoe jouw energie werkt. Denk eraan als een landkaart. De kaart bepaalt niet hoe je reist, maar hij laat wel zien welke bergen er zijn, waar de rivieren lopen en welke wegen er al bestaan. Jij bepaalt altijd hoe je beweegt.
            - paragraph [ref=f2e233]: "Een geboortekaart bestaat uit drie lagen die je altijd samenleest. De planeten zijn de krachten, archetypen van menselijke ervaring. De tekens zijn de kwaliteit waarmee die krachten zich uitdrukken. De huizen zijn het terrein: ze vertellen je waar in je leven een energie speelt. De aspecten, de hoeken tussen planeten, beschrijven hoe die energieën in jou met elkaar in gesprek zijn. Een retrograde planeet werkt naar binnen in plaats van naar buiten: meer gericht op reflectie en verdieping dan op directe uiterlijke expressie."
            - paragraph [ref=f2e234]: Energie is neutraal. Ze is niet goed of slecht, ze wil alleen bewegen. De patronen die je onbewust hebt geleefd zijn als geulen waar het water vanzelf doorheen stroomt. Bewust worden betekent niet die geulen stoppen, maar kiezen welke bedding je vanaf nu wilt graven.
            - heading "Wat de planeten betekenen" [level=3] [ref=f2e235]
            - paragraph [ref=f2e236]: De Zon is wie je bent als je vrij bent, je levensdoel en je manier van stralen. De Maan is wat je vanbinnen nodig hebt, je emotionele natuur en hoe je je veilig voelt. De Ascendant is hoe je de wereld binnenkomt, hoe anderen je als eerste ervaren. Mercurius is hoe je denkt en communiceert. Venus is wat je aantrekt en waar je je toe aangetrokken voelt. Mars is hoe je handelt en wat je drijft. Jupiter is waar je groeit en expandeert. Saturnus is waar je levenslessen zitten, wat structuur en geduld vraagt. Uranus, Neptunus en Pluto zijn generationele krachten die het grotere veld beschrijven. Chiron is de gewonde genezer, de plek waar je een diepe wond draagt en precies daar anderen kunt helen. De MC is je roeping, wat je hier komt brengen in de wereld.
