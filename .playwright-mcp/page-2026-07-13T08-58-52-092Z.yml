            - paragraph [ref=f2e742]: Dit patroon is als een QR-code van jouw ziel. Het is niet bedoeld om met het hoofd te begrijpen, maar om met het lichaam te voelen. Adem er zes seconden op in, zes seconden uit. Kijk wat er beweegt.
            - paragraph [ref=f2e743]: "Sacred geometry is niet iets wat je begrijpt. Het is iets wat je herkent. Jouw mandala is geen afbeelding om te ontcijferen, maar een frequentie om te herkennen. Kijk ernaar zoals je naar de zon kijkt: niet om te analyseren, maar om te ontvangen."
            - blockquote [ref=f2e744]: Ademreeks 6 · 6 · 6 · 6 — zes seconden in, zes seconden vasthouden, zes seconden uit, zes seconden stil.
            - paragraph [ref=f2e745]: Het laat je adem volledig worden, kalmeert je zenuwstelsel en brengt je terug naar stilte. Hang haar op een plek waar je haar dagelijks ziet. Gebruik haar op momenten van keuze of twijfel, niet om een antwoord te vinden maar om terug te keren naar jezelf.
          - generic [ref=f2e746]:
            - generic [ref=f2e747]: 09 — Overzicht & Samenvatting
            - heading "Barry in één zin" [level=2] [ref=f2e748]:
              - text: Barry
              - emphasis [ref=f2e749]: in één zin
            - blockquote [ref=f2e750]: "\"Een warme, gevoelige man met een stralende buitenkant en een oude ziel, die in 2026 een nieuw begin maakt en die wordt uitgenodigd om van het persoonlijke naar de bijdrage aan het grotere geheel te bewegen, via concreet dagelijks werk.\""
            - paragraph [ref=f2e751]: "Je hebt je door vier systemen bewogen die elk vanuit een andere hoek hetzelfde beschrijven: wie je bent, wat je draagt en wat je hier komt doen. Astrologie liet zien hoe jouw energie werkt. Numerologie gaf je de getallen die bij je geboorte aanwezig waren. Kabbalah ging een laag dieper: waarom je hier bent. Sacred geometry gaf je een taal die je lichaam al kent. Vier talen, één waarheid. Er is een energie in jou die groter is dan het verhaal dat je over jezelf vertelt, een richting die dieper gaat dan de doelen die je bewust nastreeft, en een gave die precies verstopt zit achter de plek die het meest van je heeft gevraagd."
