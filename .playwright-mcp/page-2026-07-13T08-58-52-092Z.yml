          - generic [ref=f2e778]:
            - generic [ref=f2e779]: 10 — Reflectievragen
            - heading "10 journaling vragen" [level=2] [ref=f2e780]:
              - text: "10"
              - emphasis [ref=f2e781]: journaling
              - text: vragen
            - paragraph [ref=f2e782]: Geen informatie meer. Alleen jij en de vragen. Lees elke vraag langzaam en wacht op wat er als eerste opkomt, niet op wat logisch klinkt. Schrijf het op papier, niet in je hoofd. Er gebeurt iets anders als je schrijft.
            - list [ref=f2e783]:
              - listitem [ref=f2e784]:
                - generic [ref=f2e785]: "1"
                - text: Welk inzicht uit jouw astrologie, numerologie of Tikkun kwam het hardst binnen, en wat zegt het dat juist dat je raakte?
              - listitem [ref=f2e786]:
                - generic [ref=f2e787]: "2"
                - text: Waar voelde je weerstand tijdens het lezen, en wat zou die weerstand je kunnen laten zien?
              - listitem [ref=f2e788]:
                - generic [ref=f2e789]: "3"
                - text: Waar in je leven zoek je bevestiging dat je meetelt, en wat zou er veranderen als je wist dat je er al toe doet?
              - listitem [ref=f2e790]:
                - generic [ref=f2e791]: "4"
                - text: Wat draag je nog mee dat eigenlijk af is, en wat zou er ruimte komen als je het losliet?
              - listitem [ref=f2e792]:
                - generic [ref=f2e793]: "5"
                - text: Waar houd je je licht klein of verberg je jezelf, en wat zou er gebeuren als je je liet zien zonder middelpunt te hoeven zijn?
              - listitem [ref=f2e794]:
                - generic [ref=f2e795]: "6"
                - text: Welke concrete bijdrage aan een groter geheel geeft je energie, en hoe zou je daar deze maand een eerste stap in zetten?
              - listitem [ref=f2e796]:
                - generic [ref=f2e797]: "7"
                - text: Wat zou je beginnen als je echt geloofde dat dit jaar een nieuw begin draagt en de eerste stap genoeg is?
              - listitem [ref=f2e798]:
                - generic [ref=f2e799]: "8"
                - text: Waar wacht je op toestemming om je eigen koers te kiezen, en van wie?
              - listitem [ref=f2e800]:
                - generic [ref=f2e801]: "9"
                - text: Wanneer voelde je je voor het laatst echt thuis bij jezelf? Wat maakte dat mogelijk?
              - listitem [ref=f2e802]:
                - generic [ref=f2e803]: "10"
                - text: Als je daadkracht één ding mocht doen voor het geheel, wat zou dat zijn?
          - generic [ref=f2e804]:
            - generic [ref=f2e805]: 11 — Werken met de energie
            - heading "Jouw ritme" [level=2] [ref=f2e806]:
              - text: Jouw
              - emphasis [ref=f2e807]: ritme
            - paragraph [ref=f2e808]: Jouw dagelijkse en seizoensritme op basis van jouw kaart.
            - paragraph [ref=f2e809]: Je bent geen machine. Een machine werkt elke dag hetzelfde, dezelfde input, dezelfde output, zonder ritme, zonder seizoen, zonder eb en vloed. Jij bent aarde, vuur, ether, lucht en water. En water beweegt in cycli. Het stijgt en daalt, vult en trekt zich terug, is soms helder en soms troebel. Niet omdat er iets mis is, maar omdat dat de natuur is van levende energie.
            - heading "De maan als kompas" [level=3] [ref=f2e810]
            - paragraph [ref=f2e811]: Van alle cycli die het leven structureren is de maancyclus de meest directe en meest persoonlijk voelbare. De maan beweegt het water van de oceanen, en jouw lichaam bestaat grotendeels uit water. De cyclus duurt ongeveer negenentwintig en een halve dag en doorloopt vier hoofdfasen die elk een eigen energiekwaliteit dragen.
            - generic [ref=f2e812]:
              - generic [ref=f2e813]:
                - generic [ref=f2e814]: Nieuwe maan
                - generic [ref=f2e815]: Zaaien
                - generic [ref=f2e816]: Het donkerste punt, met de meeste potentie. Een moment voor intentie, niet voor actie.
              - generic [ref=f2e817]:
                - generic [ref=f2e818]: Wassende maan
                - generic [ref=f2e819]: Bouwen
                - generic [ref=f2e820]: De energie wordt actiever en meer naar buiten gericht. Zichtbaar worden en stappen zetten.
              - generic [ref=f2e821]:
                - generic [ref=f2e822]: Volle maan
                - generic [ref=f2e823]: Oogsten
                - generic [ref=f2e824]: Alles staat in het licht, emoties dichter aan de oppervlakte. Niet pushen, maar oogsten.
              - generic [ref=f2e825]:
                - generic [ref=f2e826]: Afnemende maan
                - generic [ref=f2e827]: Loslaten
                - generic [ref=f2e828]: De energie trekt zich terug. Evalueren, integreren en loslaten wat niet mee mag.
            - paragraph [ref=f2e829]: Werken met de maan betekent niet dat je alleen handelt bij wassende maan. Het betekent dat je patronen begint op te merken en leert bewegen met wat er al is in plaats van ertegen.
            - paragraph [ref=f2e830]: Jouw kaart heeft een eigen ritme. Je Zon en Mercurius in Kreeft vragen om gevoel, rust en veiligheid; je Venus in Tweeling en je Mars in Waterman willen juist beweging, uitwisseling en bijdragen. De spanning daartussen is geen probleem maar een ritme. Tegelijk vraagt je Maan in Weegschaal om evenwicht, en je twee retrograde planeten in Huis 4 om innerlijke rust rond thuis en je wortels.
            - generic [ref=f2e831]:
              - generic [ref=f2e832]:
                - generic [ref=f2e833]: Ochtend
                - generic [ref=f2e834]: Voel eerst naar binnen
                - generic [ref=f2e835]: Je gevoelige Kreeft-zon is in de ochtend, voordat de wereld aanstaat, het zuiverst. Neem even rust en voel naar binnen voordat de dag zich vult met de behoeften van anderen.
              - generic [ref=f2e836]:
                - generic [ref=f2e837]: Aarde & lichaam
                - generic [ref=f2e838]: Vertrouwde grond
                - generic [ref=f2e839]: Met je Kreeft-zon en je wortels in Huis 4 laad je op in vertrouwde, veilige omgevingen en in contact met thuis. Geef die momenten ruimte; ze halen je uit je hoofd terug in je lichaam.
              - generic [ref=f2e840]:
