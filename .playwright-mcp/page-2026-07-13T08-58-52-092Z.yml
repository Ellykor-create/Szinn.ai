                - generic [ref=f2e451]: Uitdrukking
                - generic [ref=f2e452]: "5"
                - generic [ref=f2e453]: "Je uitdrukkingsgetal laat zien hoe je je talenten en capaciteiten in de wereld zet: de manier waarop anderen je in actie leren kennen."
              - generic [ref=f2e454]:
                - generic [ref=f2e455]: Zielenurge
                - generic [ref=f2e456]: "6"
                - generic [ref=f2e457]: Je zielenurge, berekend uit de klinkers in je naam, wijst op wat je diepste drijfveer werkelijk verlangt, onder alles wat zichtbaar is.
              - generic [ref=f2e458]:
                - generic [ref=f2e459]: Persoonlijkheid
                - generic [ref=f2e460]: "8"
                - generic [ref=f2e461]: Je persoonlijkheidsgetal, uit de medeklinkers, beschrijft de eerste indruk die je maakt voordat mensen je echt kennen.
            - heading "Levenspad 9 — De Wijze" [level=3] [ref=f2e462]
            - paragraph [ref=f2e463]: "Het getal 9 is de oude ziel, de voltooier. Het is het laatste getal van de cyclus en draagt de energie van mededogen, overgave en loslaten. Wie een 9 draagt, voelt zich vaak verbonden met iets dat groter is dan het persoonlijke. Je hebt een breed hart en de neiging om te geven, te dragen en te helpen. De schaduw is martelaarschap: blijven dragen wat eigenlijk losgelaten mag worden."
            - paragraph [ref=f2e464]: "Hier raken je getal en je kaart elkaar. Je Levenspad 9 en je Zuidknoop in Leeuw beschrijven samen het werk rond geven en gezien worden. En je Noordknoop in Waterman in Huis 6 wijst naar de volwassen vorm van de 9: bijdragen aan het collectief, niet vanuit opoffering, maar vanuit een vrije keuze om iets te geven aan het geheel."
            - heading "Persoonlijk Jaar 1 (2026)" [level=3] [ref=f2e465]
            - paragraph [ref=f2e466]: "De 1 staat voor een nieuw begin, initiatief, de eerste stap en zelf het roer pakken. Het is het eerste jaar van een nieuwe negenjarige cyclus. Voor jou is dat extra betekenisvol: een Levenspad 9, de voltooier, gaat een 1-jaar binnen. Iets ouds is afgerond en er begint iets gloednieuws."
            - paragraph [ref=f2e467]: "De energie van dit 1-jaar resoneert met je Noordknoop in Waterman in Huis 6 en met Mars die daar vlak bij staat: een jaar dat je uitnodigt om de eerste concrete stappen te zetten richting je bijdrage aan het geheel."
            - generic [ref=f2e469]:
              - generic [ref=f2e470]: De cyclus van 2026
              - heading "Van oogst naar fundament" [level=3] [ref=f2e471]
              - paragraph [ref=f2e472]: "Je persoonlijke maandgetallen lopen van 8 (juli, kracht en oogst) via 9 (augustus, voltooien en loslaten) naar 1 (september, een nieuw begin), 11 (oktober, een meestermaand vol intuïtie), 3 (november, expressie en vreugde) en 4 (december, grond en structuur). Oktober draagt de meester-energie 11: een maand om extra naar je gevoel en je intuïtie te luisteren."
          - generic [ref=f2e473]:
            - generic [ref=f2e474]: 07 — Kabbalah & Tikkun
            - heading "De zielstaak van Barry" [level=2] [ref=f2e475]:
              - text: De
              - emphasis [ref=f2e476]: zielstaak
              - text: van Barry
            - paragraph [ref=f2e477]: "Tikkun is een Hebreeuws woord. Het betekent correctie, herstel, heelmaking. In de Kabbalistieke traditie verwijst het naar de specifieke taak die jouw ziel op zich heeft genomen in dit leven: wat is er gekomen om te helen, te leren en te transformeren? Het is geen straf en geen gebrek. Het is een richting, een keuze die je ziel maakte voordat je hier aankwam. Het is de reden waarom bepaalde patronen steeds terugkeren, totdat je erdoorheen kijkt."
            - paragraph [ref=f2e478]: Waar numerologie je vertelt welke energie je meebrengt, en astrologie laat zien hoe die energie zich ontvouwt, gaat Tikkun een laag dieper. Het vraagt niet wie je bent of hoe je functioneert. Het vraagt waarom je hier bent, op het niveau van de ziel.
            - paragraph [ref=f2e479]: "Tikkun beschrijft drie dingen samen. De kernwond is het thema dat het diepst zit, dat het vroegst verscheen en dat het langst heeft doorgewerkt: de plek waar jouw pijn en jouw gave hetzelfde adres delen. Het herhalingspatroon laat zien welke thema's steeds terugkeren in relaties, werk en keuzes. En de zielstaak is de richting: wat je het hardst hebt moeten leren, is vaak precies wat je later het diepst kunt doorgeven. De bedoeling is niet om je Tikkun op te lossen, maar om ermee te leren dansen."
            - generic [ref=f2e481]:
              - generic [ref=f2e482]: Kernthema
              - heading "Gezien worden versus bijdragen aan het geheel" [level=3] [ref=f2e483]
              - paragraph [ref=f2e484]: "De Zuidknoop in Leeuw in Huis 12 wijst op een vertrouwd patroon: de behoefte om gezien, gewaardeerd en bevestigd te worden op een innerlijk, verborgen podium. Daaronder leeft de vraag of je meetelt. Als oude ziel met een Levenspad 9 ken je ook het patroon van blijven dragen en moeilijk kunnen loslaten."
            - generic [ref=f2e486]:
              - generic [ref=f2e487]: Groei
              - heading "Bijdragen via concreet dagelijks werk" [level=3] [ref=f2e488]
              - paragraph [ref=f2e489]: "Je Noordknoop in Waterman in Huis 6 vraagt het tegenovergestelde: je richten op het collectief, op vernieuwing en op concreet dagelijks werk dat het grotere geheel dient. Van \"het draait om mij\" naar \"ik draag bij\". Met Mars vlak bij je Noordknoop is de daadkracht al aanwezig."
            - generic [ref=f2e491]:
              - generic [ref=f2e492]: Zielstaak
              - paragraph [ref=f2e493]: "Jouw Tikkun in dit leven is: leren dat je meetelt door wat je geeft aan het geheel, niet door gezien te worden, en als Levenspad 9 leren om los te laten en te voltooien zonder jezelf te verliezen. Het betekent ook durven loslaten wat af is, zodat er ruimte komt voor het nieuwe begin dat 2026 draagt."
            - 'heading "Retrograde planeten: innerlijke verwerking" [level=3] [ref=f2e494]'
            - paragraph [ref=f2e495]: "Twee planeten staan retrograde in jouw kaart: Jupiter en Neptunus, allebei in Huis 4, het huis van thuis, wortels en je innerlijke fundament. Je diepste groei komt van binnenuit, rond het gevoel ergens thuis te horen. Dat innerlijke werk rond je fundament is precies wat je in staat stelt om naar buiten bij te dragen vanuit een stevige basis."
          - generic [ref=f2e496]:
            - generic [ref=f2e497]: 08 — Sacred Geometry
            - heading "De Mandala van Barry" [level=2] [ref=f2e498]:
              - text: De
              - emphasis [ref=f2e499]: Mandala
              - text: van Barry
            - paragraph [ref=f2e500]: "Jouw volledige geboortekaart, gegenereerd vanuit jouw exacte geboortedata, met de planeten op hun precieze ecliptische graden. In het hart roteert de Merkaba op de knooppunt-as: het gouden punt reikt naar jouw Noordknoop in Waterman (16°21'), het amethist naar jouw Zuidknoop in Leeuw."
