            - paragraph [ref=f2e1037]: Deze Blueprint is een begin. Wat je hebt gelezen is een momentopname van de energetische signatuur die je vanaf je eerste ademhaling met je meedraagt. Het is niet compleet en kan dat ook nooit zijn. Het leven blijft lagen toevoegen.
