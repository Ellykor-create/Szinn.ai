            - heading "Opvallende patronen in jouw kaart" [level=3] [ref=f2e357]
            - paragraph [ref=f2e358]: "Het eerste dat opvalt is een sterke nadruk op Huis 11, het huis van vriendschap, gemeenschap en de toekomst die je samen met anderen bouwt: je Zon, Mercurius en Venus staan daar samen, met een Leeuw-ascendant ervoor. Je kernidentiteit, je denken en je liefde leven in het huis van de groep en het collectief."
            - paragraph [ref=f2e359]: "In Huis 6, het huis van werk, dienstbaarheid en het dagelijkse, staan je Mars en je Noordknoop vlak bij elkaar in Waterman. Je daadkracht staat precies op je groeirichting: doen, bijdragen, je handen uit de mouwen voor iets dat groter is dan jij."
            - paragraph [ref=f2e360]: "Je Zuidknoop staat in Leeuw in Huis 12, tegenover je Noordknoop in Waterman in Huis 6. Dat is de as van je groei: van het persoonlijke, het zelf dat gezien wil worden, naar de bijdrage aan het collectief in concreet dagelijks werk."
            - paragraph [ref=f2e361]: "Twee planeten staan retrograde in je kaart: Jupiter en Neptunus, allebei in Huis 4, het huis van thuis en je innerlijke fundament. Daarbij draag je een Levenspad 9, en je gaat in 2026 een Persoonlijk Jaar 1 binnen. Je staat op een drempel: iets oud sluit af, iets nieuws begint."
            - generic [ref=f2e362]:
              - generic [ref=f2e363]:
                - generic [ref=f2e364]: Cluster Huis 11 (Zon · Mercurius · Venus)
                - heading "Wie je bent en met wie" [level=3] [ref=f2e365]
                - paragraph [ref=f2e366]: Je identiteit, je denken en je liefde leven in het huis van vriendschap en gemeenschap. De groei is om je gaven bewust in te zetten in de groep, vanuit warmte in plaats van vanuit de behoefte om gezien te worden.
              - generic [ref=f2e367]:
                - generic [ref=f2e368]: Knooppunt-as Leeuw H12 ↔ Waterman H6
                - heading "Van het zelf naar de bijdrage" [level=3] [ref=f2e369]
                - paragraph [ref=f2e370]: Je Noordknoop in Waterman in Huis 6 wijst naar bijdragen aan het grotere geheel via concreet dagelijks werk. Met Mars vlak bij die knoop staat je daadkracht al klaar om die stap te zetten.
          - generic [ref=f2e371]:
            - generic [ref=f2e372]: 05 — Noord- & Zuidknoop
            - heading "Van Leeuw naar Waterman" [level=2] [ref=f2e373]:
              - text: Van Leeuw
              - emphasis [ref=f2e374]: naar Waterman
            - paragraph [ref=f2e375]: "De Noord- en Zuidknoop zijn geen planeten. Het zijn twee wiskundige punten waar de baan van de Maan de ecliptica kruist. Ze staan altijd exact tegenover elkaar, op 180 graden afstand: altijd een as, altijd een spanning tussen twee richtingen. De Zuidknoop laat zien waar je vandaan komt, wat je al weet, wat je bijna reflexmatig doet en wat veilig voelt. De Noordknoop laat zien waar je naartoe groeit, wat nieuw aanvoelt, soms ongemakkelijk, en precies daar ligt de groei van dit leven."
            - paragraph [ref=f2e376]: De bedoeling is niet om de Zuidknoop achter te laten. Zie de Zuidknoop als de wortels van een boom en de Noordknoop als de richting waarin de takken groeien. Zonder wortels kan een boom niet groeien; zonder groei hebben de wortels geen bestemming. De spanning die je voelt wanneer je richting je Noordknoop beweegt, betekent niet dat je de verkeerde kant op gaat. Vaak betekent het dat je een nieuwe versie van jezelf ontmoet.
            - paragraph [ref=f2e377]: "Je herkent de Zuidknoop aan wat moeiteloos lijkt te gaan. Het voelt vertrouwd, je hoeft er nauwelijks over na te denken, en onder druk val je erop terug. De Zuidknoop is niet fout; veel van je natuurlijke kracht leeft hier. Je herkent de Noordknoop aan een gevoel van onzekerheid of weerstand. Het kan voelen als \"dit ben ik niet\" of \"wie ben ik om dit te doen\". Juist daarom is het zo waardevol: het wijst naar waar groei en vervulling plaatsvinden."
            - paragraph [ref=f2e378]: "De knooppunt-as in jouw kaart vertelt het verhaal van jouw ziel. De Zuidknoop in Leeuw in Huis 12 laat zien wat vertrouwd is: het zelf, de behoefte om gezien en gewaardeerd te worden, warmte en uitstraling, maar gespeeld op een verborgen, innerlijk podium. Het is een echte gave, en het heeft je vaak hart en kleur gegeven."
            - paragraph [ref=f2e379]: "De Noordknoop in Waterman in Huis 6 wijst de richting: naar bijdragen aan het collectief, naar vernieuwen, naar concreet dagelijks werk dat het grotere geheel dient. Van \"het draait om mij\" naar \"het draait om wat ik geef\". Met Mars vlak bij je Noordknoop is je daadkracht al op die richting afgestemd."
            - generic [ref=f2e380]:
              - generic [ref=f2e381]:
                - generic [ref=f2e382]: Zuidknoop — Oorsprong
                - heading "Leeuw · Huis 12" [level=3] [ref=f2e383]
                - paragraph [ref=f2e384]: Je kent de energie van het zelf dat gezien wil worden, van warmte en uitstraling, maar op een innerlijk, verborgen podium. Dit patroon is vertrouwd en heeft je kleur gegeven. Maar het voedt je niet meer wanneer alles om jou als middelpunt draait, of wanneer je je licht juist verbergt.
              - generic [ref=f2e385]:
                - generic [ref=f2e386]: Noordknoop — Groeirichting
                - heading "Waterman · Huis 6" [level=3] [ref=f2e387]
                - paragraph [ref=f2e388]: Jouw zielsrichting is bijdragen aan het grotere geheel via concreet dagelijks werk. Niet het zelf in het midden, maar het werk dat het collectief dient. De stap is je daadkracht inzetten voor iets dat groter is dan jou, en vertrouwen dat je meetelt door wat je geeft.
            - heading "Chiron in Ram in Huis 9" [level=3] [ref=f2e389]
            - paragraph [ref=f2e390]: "Chiron, de gewonde genezer, staat in Ram in Huis 9, het huis van betekenis, geloof en het grotere verhaal. Dit kan wijzen op een oude gevoeligheid rond je recht om je eigen kant te kiezen. De heling komt juist via het durven kiezen van je eigen koers: elke keer dat je je eigen richting volgt in plaats van te wachten op toestemming, keer je deze wond naar haar gave."
          - generic [ref=f2e391]:
            - generic [ref=f2e392]: 06 — Numerologie
            - heading "De getallen van Barry" [level=2] [ref=f2e393]:
              - text: De
              - emphasis [ref=f2e394]: getallen
              - text: van Barry
            - paragraph [ref=f2e395]: Pythagorisch systeem · Berekend vanuit 30 juni 1971 en je geboortenaam · Meestergetallen niet gereduceerd
            - paragraph [ref=f2e396]: "Numerologie is de studie van de symbolische en energetische betekenis van getallen. Het systeem dat wij gebruiken is gebaseerd op de leer van Pythagoras: elk getal van 1 tot en met 9 draagt een eigen energie, een eigen karakter, een eigen beweging. Het voorspelt niet wat er gaat gebeuren; het maakt zichtbaar welke energieën en patronen actief zijn in jouw leven. Getallen liegen niet. Ze spiegelen."
            - generic [ref=f2e397]:
              - generic [ref=f2e398]:
                - generic [ref=f2e399]: 1 · Pionier
                - generic [ref=f2e400]: Begin & moed
                - generic [ref=f2e401]: "De moed om als eerste te gaan. Schaduw: eigenzinnigheid."
              - generic [ref=f2e402]:
                - generic [ref=f2e403]: 2 · De brug
                - generic [ref=f2e404]: Verbinding
                - generic [ref=f2e405]: "Gevoeligheid en samenwerking. Schaduw: afhankelijkheid."
              - generic [ref=f2e406]:
                - generic [ref=f2e407]: 3 · Schepper
                - generic [ref=f2e408]: Expressie
                - generic [ref=f2e409]: "Creativiteit, vreugde, communicatie. Schaduw: verstrooiing."
              - generic [ref=f2e410]:
                - generic [ref=f2e411]: 4 · Bouwer
                - generic [ref=f2e412]: Structuur
                - generic [ref=f2e413]: "Fundament en betrouwbaarheid, bouwen wat blijft. Schaduw: rigiditeit."
              - generic [ref=f2e414]:
                - generic [ref=f2e415]: 5 · Avonturier
                - generic [ref=f2e416]: Vrijheid
                - generic [ref=f2e417]: "Avontuur, verandering, beweging. Schaduw: rusteloosheid."
              - generic [ref=f2e418]:
                - generic [ref=f2e419]: 6 · Verzorger
                - generic [ref=f2e420]: Harmonie
                - generic [ref=f2e421]: "Zorg en verantwoordelijkheid, geven vanuit liefde. Schaduw: jezelf verliezen."
              - generic [ref=f2e422]:
                - generic [ref=f2e423]: 7 · Mysticus
                - generic [ref=f2e424]: Diepte
                - generic [ref=f2e425]: "Wijsheid, zoeken, onderzoek. Schaduw: isolatie."
              - generic [ref=f2e426]:
                - generic [ref=f2e427]: 8 · Meesterbouwer
                - generic [ref=f2e428]: Kracht
                - generic [ref=f2e429]: "Oogst, autoriteit, manifestatie. Schaduw: controle."
              - generic [ref=f2e430]:
                - generic [ref=f2e431]: 9 · Wijze
                - generic [ref=f2e432]: Voltooiing
                - generic [ref=f2e433]: "Mededogen en overgave, loslaten. Schaduw: martelaarschap."
            - paragraph [ref=f2e434]: "De meestergetallen 11 (de ziener), 22 (de meesterbouwer) en 33 (de meesterleraar) dragen een verhoogde trilling van hun basisgetal. Ze brengen meer potentieel, maar vragen ook om meer bewustzijn en innerlijke ontwikkeling. We werken met je officiële geboortenaam zoals geregistreerd op je geboorteakte, niet met een roepnaam of getrouwde naam: dat is de energetische signatuur waarmee je dit leven bent gestart."
            - heading "De vijf kerngetallen" [level=3] [ref=f2e435]
            - paragraph [ref=f2e436]: "Het Levenspad, berekend uit je geboortedatum, is de centrale energie van dit leven, je hoofdthema en de les die je bent gekomen om te leren. Het verandert nooit. Het Persoonlijk Jaar, uit je geboortedag, geboortemaand en het huidige jaar, is de energie die dit jaar beschikbaar is, als deel van een negenjarige cyclus. Het Uitdrukkingsgetal, uit je volledige geboortenaam, is hoe je je uitdrukt in de wereld: je talenten en capaciteiten. De Zielenurge, uit de klinkers in je naam, is wat jouw ziel werkelijk verlangt, het meest intieme getal. Het Persoonlijkheidsgetal, uit de medeklinkers, is hoe anderen jou waarnemen voordat ze je echt kennen."
            - generic [ref=f2e437]:
