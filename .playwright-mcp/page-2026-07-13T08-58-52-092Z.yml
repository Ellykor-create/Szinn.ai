              - emphasis [ref=f2e869]: upgrade-plan
            - paragraph [ref=f2e871]:
              - strong [ref=f2e872]: "Jouw vier lagen op dit moment:"
              - text: "Astrologie — Cluster in Huis 11 en Mars op de Noordknoop in Waterman, Huis 6: jezelf vinden in de groep en bijdragen aan het geheel"
              - text: "Numerologie — Levenspad 9 en Persoonlijk Jaar 1: de oude ziel die een nieuw begin maakt"
              - text: "Zielrichting — Helder en open: van het persoonlijke naar de bijdrage, via concreet dagelijks werk"
              - text: "Persoonlijk Jaar — PJ 1: het eerste jaar van een nieuwe cyclus, een jaar van initiatief"
              - text: "De praktijken hieronder richten zich op waar de meeste beweging mogelijk is. Voor jou is dat nu vooral:"
              - strong [ref=f2e873]: de brug tussen het persoonlijke en de bijdrage, en tussen gezien willen worden en weten dat je ertoe doet
            - paragraph [ref=f2e874]: "Dit is het moeilijkste deel. Niet omdat het ingewikkeld is, maar omdat het eerlijkheid vraagt. Kennis verandert niets. Herkenning verandert niets. Zelfs de diepste spirituele ervaring verandert niets als ze niet gevolgd wordt door één ding: een andere keuze. In een gewoon moment, op een gewone dag."
            - heading "De wereld is jouw spiegel" [level=3] [ref=f2e875]
            - paragraph [ref=f2e876]: De werkelijkste, eerlijkste en meest directe spiegel die je hebt is de wereld om je heen. De mensen in je leven, de situaties die steeds terugkomen, de dingen die je irriteren, raken, bewonderen of afstoten. Alles wat je buiten jezelf ziet is een reflectie van wat er binnen in je leeft. Het moment dat je dit herkent en helder hebt, stop je met onbewust herhalen en begin je bewust te creëren.
            - heading "Schaduwkanten als spiegel" [level=3] [ref=f2e877]
            - paragraph [ref=f2e878]: "Wat je in een ander irriteert draagt een kwaliteit die ook in jou leeft, anders zou het je niet raken. Wat je in een ander bewondert draagt een kwaliteit die ook in jou leeft, nog niet volledig geclaimd maar aanwezig, anders zou je het niet herkennen. Elk oordeel over een ander is een spiegel. De vraag is nooit wat er mis is met die ander, maar altijd: wat wil deze reactie mij laten zien over mezelf?"
            - heading "Jouw schaduwkanten zijn niet je vijanden" [level=3] [ref=f2e879]
            - paragraph [ref=f2e880]: "Voor jou leeft de schaduw vooral in twee dingen. Het eerste is de behoefte om gezien en bevestigd te worden, of juist het tegenovergestelde: je licht verbergen en jezelf wegcijferen, geworteld in je Zuidknoop in Leeuw in Huis 12. Het tweede is het patroon van de oude ziel: blijven dragen en moeilijk kunnen loslaten wat eigenlijk af is, geworteld in je Levenspad 9. Geen van beide is een vijand. Elke keer dat je iets geeft aan het geheel zonder je te hoeven bewijzen, beweeg je richting je Noordknoop in Waterman."
            - heading "Jouw zes gaven" [level=3] [ref=f2e881]
            - paragraph [ref=f2e882]: "Er is iets wat jou onderscheidt van alles om je heen: zes vermogens die jou in staat stellen om te stoppen, te kijken en anders te kiezen. Intuïtie is het weten dat er is voordat de redenering er is. Verbeeldingskracht is het vermogen om iets te zien dat er nog niet is. Geheugen is het vermogen om patronen te herkennen over tijd. Redeneren is het vermogen om verbanden te leggen. Perceptie is hoe je waarneemt, en hoe je het ziet bepaalt wat je ervaart. Wilskracht is het vermogen om te kiezen in plaats van automatisch te reageren. Deze zes gaven zijn altijd beschikbaar. Ze wachten niet op een goed moment."
            - heading "Hoe jouw zes gaven oplichten in je kaart" [level=3] [ref=f2e883]
            - paragraph [ref=f2e884]: Je zes gaven zijn de kracht van je kaart in pure vorm. Hoe bewuster je ze inzet, hoe meer je kaart-energie stroomt.
