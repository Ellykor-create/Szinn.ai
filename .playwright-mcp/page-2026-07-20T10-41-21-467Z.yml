      - generic [ref=e939]: "Je Zuidknoop in Kreeft wil je alles geven. Leren: nee zeggen is liefde. Als je uitgeput bent, creëer je niet; je bent ook niet beschikbaar voor wat écht belangrijk is. Elke nee is een ja naar iets essentiëlers."
