    - paragraph [ref=e831]: "Je draagt een sterke innerlijke beweging in je geboortekaart: Zon en Maan beide in Schorpioen in huis 4 geven je een diepgravende, intuïtieve kern die voortdurend naar waarheid zoekt. Tegelijkertijd trekt Mars retrograde in Stier je naar stabiliteit en grounding, terwijl Jupiter in Waterman je drang naar vrijheid en vernieuwing voert. Dit spanningsveld — tussen diepte en loslaten, tussen wortelen en vliegen — is niet iets wat op moet, maar juist je ritme: je groeit doordat je beide bewegingen toestaat en ze met elkaar laat dansen."
