      - generic [ref=e922]: Gegronde communicatie
      - generic [ref=e923]: "Voordat je iets belangrijks zegt: voel je voeten op de grond, adem drie keer in en uit, en vraag jezelf af: is dit mijn waarheid, of probeer ik iemand te veranderen? Schorpioen-energie is direct; aarden maakt het heilzaam."
