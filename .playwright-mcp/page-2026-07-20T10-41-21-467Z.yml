      - generic [ref=e931]: "Voor je naar buiten gaat: wat voelt waar in mij? Wat heb ik nodig vandaag? Creëer ruimte voor dit vraag-antwoord. Dit is geen zelfzuchtigheid; dit is wat je Noordknoop vraagt: eerst jezelf horen."
    - generic [ref=e932]:
