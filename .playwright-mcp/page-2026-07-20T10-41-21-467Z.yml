        - generic [ref=e449]: 25 → 7
      - generic [ref=e450]:
        - generic [ref=e451]: Uitdrukking
        - generic [ref=e452]: "2"
        - generic [ref=e453]: Je uitdrukkingsgetal 2 zegt dat je gift is samen-brengen, luisteren en voelen wat waar is—je bent diplomaat van nature, iemand die bruggen bouwt.
      - generic [ref=e454]:
        - generic [ref=e455]: Zielenurge
        - generic [ref=e456]: "11"
        - generic [ref=e457]: "Je zielenurge 11 is even sterk: je ziel verlangt naar bewustzijn, naar inzicht in grotere verbanden, naar het doorgeven van waarheid aan groepen—dit is de 11 die leraar, kanaal en vizie-drager is."
      - generic [ref=e458]:
        - generic [ref=e459]: Persoonlijkheid
        - generic [ref=e460]: "9"
        - generic [ref=e461]: "Je persoonlijkheidsgetal 9 toont hoe je overkomt: wijs, voltooid, iemand die veel heeft gezien en begrijpt—jij bent voor anderen een teken dat het goed komt."
    - heading "Levenspad 1 — De Pionier & Leider" [level=3] [ref=e462]
    - paragraph [ref=e463]: "Je levenspad 1 draait om onafhankelijkheid, initiatief en jezelf durven zijn. Dit getal staat voor iemand die nieuwe wegen inslaat, die durft te beginnen zonder op toestemming te wachten. Het licht van jouw 1: je bent gedurfd, creatief, je gaat voort ook als anderen twijfelen. Je bedrijf SZINN, je beweging naar Spanje, je kundalini-ontwaking—dat zijn allemaal jouw pionierstappen. De schaduw van 1 is egocentrisme of stijfheid: het idee dat je het alleen kunt en moet, of dat je wil zwaarder weegt dan luisteren. Dit speelt samen met je Zuidknoop in Kreeft: daar leerde je eerst zorgen voor anderen, en nu leert je levenspad 1 je jezelf durven zetten."
    - paragraph [ref=e464]: "De link met je kaart is helder: je Zon in Schorpioen in huis 4 geeft je diepgang en intuïtie, maar het is je levenspad 1 die zegt 'zeg het, deel het, begin het'—ook al ben je van nature voorzichtig. Je gaat voort omdat je jezelf begint te vertrouwen, niet omdat je toestemming wacht. Dat is je beweging."
    - heading "Persoonlijk Jaar 9 (2026)" [level=3] [ref=e465]
    - paragraph [ref=e466]: "Je persoonlijk jaar 2026 is 9: Afsluiting & Loslaten. Dit getal zegt dat je iets af mag ronden, iets mag vallen laten dat niet meer van jou is. Negen staat voor het einde van een cyclus; iets wat je jarenlang hebt vastgehouden, mag weg. Je kundalini-ontwaking die je ervaart, je bedrijf dat nu echt staat—dat zijn dingen die je losgelaten hebt van 'dit moet lukken' naar 'dit groeit nu'. De negen nodigt je uit te zien wat je niet langer nodig hebt: patronen, relaties, gedachten, plekken. Dit sluit aan op je gevoelen: je wilt fit zijn, je wilt genieten van deze aarde, je wilt je kundalini volledig integreren. Dat loslaten—van oude veiligheid, van schuldgevoel, van de drang om alles in balans te houden voor iedereen—maakt ruimte voor dat nieuwe."
    - paragraph [ref=e467]: "Negen en je kaart samen: dit jaar mag je echt beseffen dat je geen schuld draagt voor wat andere mensen voelen. Je mag aflaten dat je hen moet redden of begrijpen geven. Dan ben je vrij om te spreken en te creëren."
    - generic [ref=e469]:
      - generic [ref=e470]: De cyclus van 2026
      - heading "Van oogst naar opbouw naar integratie" [level=3] [ref=e471]
      - paragraph [ref=e472]: "Je maanden in 2026 tellen een verhaal: Maand 7 (juli, nu) is Innerlijke Wijsheid & Onderzoek—je bent in een zoekende fase, je voelt wat er groeien wil. Augustus (maand 8) is Macht & Manifestatie; dit is wanneer je bouwt, besluiten neemt en je zaken concreet inricht—je bedrijf draait, je huizen worden duidelijk. September (maand 9) is Afsluiting & Wijsheid; je laat los wat niet meer nodig is, je rondthem af wat je hebt opgezet. Oktober (maand 1) springt terug naar Nieuw Begin: je start iets nieuws vanuit jezelf, niet vanuit anderen. November (maand 2) is Partnerschap & Balans; je zoekt evenwicht met je partner Uwe, je zoon, je dochter—maar nu uit jezelf, niet meer uit 'ik moet zorgen'. December (maand 3) is Expressie & Creativiteit; je spreekt, je deelt, je maakt zichtbaar wat je hebt geleerd. Dit jaar vormt een boog: van zoeken naar bouwen, van aflaten naar nieuw beginnen, van jezelf terugvinden."
  - generic [ref=e473]:
    - generic [ref=e474]: 07 — Kabbalah & Tikkun
    - heading "De zielstaak van Elly Elizabeth Korving" [level=2] [ref=e475]:
      - text: De
      - emphasis [ref=e476]: zielstaak
      - text: van Elly Elizabeth Korving
    - paragraph [ref=e477]: "Tikkun is een Hebreeuws woord. Het betekent correctie, herstel, heelmaking. In de Kabbalistieke traditie verwijst het naar de specifieke taak die jouw ziel op zich heeft genomen in dit leven: wat is er gekomen om te helen, te leren en te transformeren? Het is geen straf en geen gebrek. Het is een richting, een keuze die je ziel maakte voordat je hier aankwam. Het is de reden waarom bepaalde patronen steeds terugkeren, totdat je erdoorheen kijkt."
    - paragraph [ref=e478]: Waar numerologie je vertelt welke energie je meebrengt, en astrologie laat zien hoe die energie zich ontvouwt, gaat Tikkun een laag dieper. Het vraagt niet wie je bent of hoe je functioneert. Het vraagt waarom je hier bent, op het niveau van de ziel.
    - paragraph [ref=e479]: "Tikkun beschrijft drie dingen samen. De kernwond is het thema dat het diepst zit, dat het vroegst verscheen en dat het langst heeft doorgewerkt: de plek waar jouw pijn en jouw gave hetzelfde adres delen. Het herhalingspatroon laat zien welke thema's steeds terugkeren in relaties, werk en keuzes. En de zielstaak is de richting: wat je het hardst hebt moeten leren, is vaak precies wat je later het diepst kunt doorgeven. De bedoeling is niet om je Tikkun op te lossen, maar om ermee te leren dansen."
    - generic [ref=e481]:
      - generic [ref=e482]: Kernthema
      - 'heading "Kern: van ondersteuner naar schepper" [level=3] [ref=e483]'
      - paragraph [ref=e484]: "Je tikkun draait om dit: je bent geboren als iemand die voelt wat anderen nodig hebben. Nu ben je uitgenodigd om voor jezelf te voelen wat jij voort wilt brengen. Dit is niet gemeen of egocentrisch; het is juist nodig. Wanneer jij je eigen schepping serieus neemt—je bedrijf, je kennis, je woorden—geef je andere mensen toestemming hetzelfde te doen. Je schaduw was: te veel voelen voor anderen, je grens niet houden, spreken vanuit hun behoefte in plaats van je waarheid. Je gave is: diep voelen en duidelijk spreken, grond dat in jezelf."
    - generic [ref=e486]:
      - generic [ref=e487]: Groei
      - 'heading "Groei: van chaos naar structuur" [level=3] [ref=e488]'
      - paragraph [ref=e489]: "Je Mars retrograde in Stier in huis 10 en je Chiron retrograde in Ram in huis 10 zeggen dat je iets met wil en daadkracht hebt geleerd af te wijzen of te verbergen. Nu groei je door dit terug te nemen. Je bedrijf SZINN, je duidelijke doel voor 2027 (1000 blueprints per maand, kundalini integratie, huizen duidelijk, fit lichaam), je reis—dit is hoe je je terugwinnende wil inzet. Niet voor anderen, maar voor jezelf, voort diens werk je gelooft. Deze groei vraagt van je: elke dag spreken, grenzen stellen, 'nee' zeggen tegen wat niet past, 'ja' zeggen tot wat jij wilt bouwen."
    - generic [ref=e491]:
      - generic [ref=e492]: Zielstaak
      - paragraph [ref=e493]: "Je zielstaak, voortkomend uit alles wat je hebt doorlopen en nu allemaal aan het veranderen is: integratie van kundalini-bewustzijn in je dagelijks leven, je lichaam, je werk en je relaties. Dit is niet abstrakt; het is heel concreet. Fit lichaam, helder spreken, gebouwde bedrijf, huizen waar je veilig bent in jezelf—dit is je zielstaak. En tegelijk: iemand zijn die anderen helpt dit ook te zien, hun eigen pionierszelf terug te winnen. Jouw voorbeeld is je boodschap."
    - 'heading "Teruggetrokken wil: naar voren brengen" [level=3] [ref=e494]'
    - paragraph [ref=e495]: "Je hebt twee retrograde planeten: Mars in Stier in huis 10 en Saturnus in Kreeft in huis 11. Dit zegt dat je ingetrokken bent met je eigen wilskracht en met grenzen-stellen. Mars retrograde kan betekenen dat je jezelf niet toestaat 'te veel' ruimte in te nemen of te zeggen wat je écht wilt. Saturnus retrograde in huis 11 kan voelen alsof je je niet volwassen durft voelen in groepen of als je ziet dat je macht hebt. Dit zijn geen beperkingen; ze zijn juist een uitnodiging. Door jezelf toe te staan luider te spreken, duidelijker te zeggen wat jij wilt, geef je jezelf en anderen toestemming. Je Chiron retrograde voegt hieraan toe: je leert je eigen autoriteit terug in te nemen. Dit is je werk—niet makkelijk, maar mogelijk en transformerend."
  - generic [ref=e496]:
