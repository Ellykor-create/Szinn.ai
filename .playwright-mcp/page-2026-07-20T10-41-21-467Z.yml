        - generic [ref=e893]: Verbeeldingskracht
        - generic [ref=e894]: "Verbeeldingskracht (Neptun in Boogschutter, huis 5): je ziet mogelijkheden, toekomstige werkelijkheden. Toepassing: schrijf op, teken, deel je visie; laat anderen zien wat je voor ze ziet. Dit is hoe je leidt."
