  - generic [ref=e779]:
    - generic [ref=e780]: 10 — Reflectievragen
    - heading "10 journaling vragen" [level=2] [ref=e781]:
      - text: "10"
      - emphasis [ref=e782]: journaling
      - text: vragen
    - paragraph [ref=e783]: Geen informatie meer. Alleen jij en de vragen. Lees elke vraag langzaam en wacht op wat er als eerste opkomt, niet op wat logisch klinkt. Schrijf het op papier, niet in je hoofd. Er gebeurt iets anders als je schrijft.
    - list [ref=e784]:
      - listitem [ref=e785]:
        - generic [ref=e786]: "1"
        - text: Wanneer voel je jezelf het meest grond en helder—en wat doen je dan anders dan op momenten dat je diffuus voelt?
      - listitem [ref=e787]:
        - generic [ref=e788]: "2"
        - text: Je zegt dat je jezelf 'beter wilt uiten vanuit simpelheid'. Wat voelen voor je de obstakels om dat te doen, en wat zou je nodig hebben om ze opzij te zetten?
      - listitem [ref=e789]:
        - generic [ref=e790]: "3"
        - text: Je wens naar kundalini-ontwaking en integratie—hoe merk je dat in je lichaam, en wat zeggen je energie en lichaam je dit moment?
      - listitem [ref=e791]:
        - generic [ref=e792]: "4"
        - text: Je hebt twee huizen (Haarlem, Nerja/Málaga) en twee werelden. Hoe voelt het verschil voor je, en wat geeft elk je dat je van het ander niet krijgt?
      - listitem [ref=e793]:
        - generic [ref=e794]: "5"
        - text: Je merkt dat je soms 'niet kunt stoppen met zeggen wat je ziet'. Wat is je diepste angst als je dat wél doet—niet spreekt, niet deelt, stilte houdt?
      - listitem [ref=e795]:
        - generic [ref=e796]: "6"
        - text: Je bewondert hoe Sean kennis deelt 'vanuit rust en ontspanning'. Wat houdt jou ervan om op diezelfde manier te spreken, en wat zou los moeten gaan?
      - listitem [ref=e797]:
        - generic [ref=e798]: "7"
        - text: Je lichaam—je wil fit zijn, je wil genieten. Hoe spreekt je lichaam nu met je over wat het nodig heeft, en luister je daarnaar?
      - listitem [ref=e799]:
        - generic [ref=e800]: "8"
