      - paragraph [ref=e969]: "Ik ben Elizabeth. Wat mij het moeilijkst valt is: focus en volhouden in het nu. Ik zie zoveel mogelijkheden (mijn Neptun in Boogschutter), ik wil zoveel (mijn Jupiter in Waterman, mijn Levenspad 1), en soms verlies ik mezelf in alle richtingen. Dit jaar (persoonlijk jaar 9) vraagt mij om los te laten en af te sluiten. Welk patroon uit mijn jeugd of eerdere levens zit achter deze moeilijkheid om in het nu te blijven? Wat ben ik bang kwijt te raken als ik focus krijg op één ding? En hoe kan ik jaar 9 gebruiken om dit oude patroon werkelijk los te laten?"
