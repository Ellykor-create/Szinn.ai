        - generic [ref=e890]: "Intuïtie (Maan in Schorpioen): je voelt wat onder de oppervlakte speelt. Toepassing: neem je intuïtie serieus wanneer je voelt dat iets niet klopt of wanneer je iemands waarheid aanvoelt. Dit is je kompas; luister erernaar."
