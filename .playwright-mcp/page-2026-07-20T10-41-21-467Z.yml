    - blockquote [ref=e751]: "\"Jij bent iemand die voelt en begrijpt, en nu leer je dat dezelfde voelkracht je leidt naar wat jij wilt maken—om vandaar uit anderen te helpen.\""
    - paragraph [ref=e752]: "Je hebt je door vier systemen bewogen die elk vanuit een andere hoek hetzelfde beschrijven: wie je bent, wat je draagt en wat je hier komt doen. Astrologie liet zien hoe jouw energie werkt. Numerologie gaf je de getallen die bij je geboorte aanwezig waren. Kabbalah ging een laag dieper: waarom je hier bent. Sacred geometry gaf je een taal die je lichaam al kent. Vier talen, één waarheid. Er is een energie in jou die groter is dan het verhaal dat je over jezelf vertelt, een richting die dieper gaat dan de doelen die je bewust nastreeft, en een gave die precies verstopt zit achter de plek die het meest van je heeft gevraagd."
