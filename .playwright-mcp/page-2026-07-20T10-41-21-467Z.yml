    - paragraph [ref=e810]: Je bent geen machine. Een machine werkt elke dag hetzelfde, dezelfde input, dezelfde output, zonder ritme, zonder seizoen, zonder eb en vloed. Jij bent aarde, vuur, ether, lucht en water. En water beweegt in cycli. Het stijgt en daalt, vult en trekt zich terug, is soms helder en soms troebel. Niet omdat er iets mis is, maar omdat dat de natuur is van levende energie.
