        - generic [ref=e856]: Water (Zon, Maan & Mercurius in Schorpioen)
        - heading "Je vermogen om diep te voelen en te begrijpen" [level=3] [ref=e857]
        - paragraph [ref=e858]: "Water is jouw dominante element, en dat betekent dat je voelt voordat je denkt, dat je patronen ziet die anderen missen, en dat je intuïtie je kompas is. Je drie planeten in Schorpioen (Zon, Maan, Mercurius) maken je tot iemand die graag tot de kern van dingen doordringt — of het nu gaat om jezelf, anderen of de werkelijkheid. Dit is een kracht. De kunst is: ervoor zorgen dat dit voelen je niet overbelast. Wanneer je jezelf geaard houdt (aarde onder je voeten, lichaam bewust) kun je dit water laten stromen zonder weg te spoelen."
      - generic [ref=e859]:
        - generic [ref=e860]: Aarde (Mars retrograde in Stier, Saturn retrograde in Kreeft)
        - heading "Je verlangen naar grondvesting en waarheid" [level=3] [ref=e861]
        - paragraph [ref=e862]: "Je hebt twee retrograde planeten in aarde-getinte energie: Mars in Stier en Saturn in Kreeft. Dit betekent dat je voelt hoe belangrijk stabiliteit, eerlijkheid en duidelijkheid zijn — maar dat je soms moet leren dit aan jezelf eerst toe te staan. Mars retrograde vraagt je om je handelingen eerder te voelen dan te forceren; Saturn retrograde leert je dat grenzen en regels niet beperkend zijn, maar bevrijdend. Je verlangen naar een fit lichaam, mooie huizen, duidelijke structuur in je werk — dat komt hieruit, en het is niet oppervlakkig. Het is jouw manier van zeggen: ik zorg voor wat echt is."
      - generic [ref=e863]:
        - generic [ref=e864]: Lucht (Uranus & Pluto in Weegschaal, Jupiter in Waterman)
        - heading "Je behoefte aan vrijheid, vernieuwing en helderheid" [level=3] [ref=e865]
        - paragraph [ref=e866]: "Uranus en Pluto in Weegschaal geven je een verlangen naar evenwicht, rechtvaardigheid en transformatie; Jupiter in Waterman voegt daaraan toe: vrijheid, toekomstgericht denken, het groter plaatje zien. Je wilt niet beperkt worden; je wilt begrijpen hoe dingen werken (de mind, bewustzijn, structuren). Dit maakt je tot iemand die kan innoveren, die patronen kan doorbreken en die anderen kan helpen dat ook te doen. De kunst is: niet alles tegelijk willen veranderen. Kies één ding, laat het zich ontwikkelen, en vertrouw dat het volgende vanzelf volgt."
  - generic [ref=e867]:
    - generic [ref=e868]: 12 — Integratie
    - heading "Jouw persoonlijke upgrade-plan" [level=2] [ref=e869]:
      - text: Jouw persoonlijke
      - emphasis [ref=e870]: upgrade-plan
    - paragraph [ref=e872]:
      - strong [ref=e873]: "Jouw vier lagen op dit moment:"
      - text: Astrologie — Je kernidentiteit (Zon in Schorpioen) zoekt waarheid en diepte; je emotionele kompas (Maan in Schorpioen) werkt via voelen en intuïtie; je Noordknoop in Steenbok nodigt je uit om duidelijk, gegrond en verantwoordelijk te groeien.
      - text: Numerologie — Levenspad 1 maakt je tot pionier en leider; je roept jezelf op onafhankelijk te denken en te durven voorgaan. Persoonlijk Jaar 9 in 2026 zet je in een tijd van afsluiting en loslaten — je bereikt volwassenheid in iets wat je hebt opgebouwd.
      - text: "Zielrichting — Noordknoop in Steenbok vraagt je om authenticiteit met grond: duidelijk spreken vanuit je waarheid, niet vanuit afstemming op anderen. Zielurge 11 geeft je het vermogen om grotere groepen te inspireren en te verbinden."
      - text: "Persoonlijk Jaar — 2026 is een jaar van transformatie: wat voltooid raakt, wat je niet meer nodig hebt, laat je los. Dit creëert ruimte voor wat nieuw wil groeien — je SZINN bedrijf, je kundalini-ontwaking, je nieuwe huizen en manier van leven."
      - text: "De praktijken hieronder richten zich op waar de meeste beweging mogelijk is. Voor jou is dat nu vooral:"
      - strong [ref=e874]: "Voor jou is dat nu vooral: je woord terugnemen in jezelf — simpel, waardig en gegrond spreken — en vertrouwen dat dit alleen sterker aankomt dan al je inspanning."
    - paragraph [ref=e875]: "Dit is het moeilijkste deel. Niet omdat het ingewikkeld is, maar omdat het eerlijkheid vraagt. Kennis verandert niets. Herkenning verandert niets. Zelfs de diepste spirituele ervaring verandert niets als ze niet gevolgd wordt door één ding: een andere keuze. In een gewoon moment, op een gewone dag."
    - heading "De wereld is jouw spiegel" [level=3] [ref=e876]
    - paragraph [ref=e877]: De werkelijkste, eerlijkste en meest directe spiegel die je hebt is de wereld om je heen. De mensen in je leven, de situaties die steeds terugkomen, de dingen die je irriteren, raken, bewonderen of afstoten. Alles wat je buiten jezelf ziet is een reflectie van wat er binnen in je leeft. Het moment dat je dit herkent en helder hebt, stop je met onbewust herhalen en begin je bewust te creëren.
    - heading "Schaduwkanten als spiegel" [level=3] [ref=e878]
    - paragraph [ref=e879]: "Wat je in een ander irriteert draagt een kwaliteit die ook in jou leeft, anders zou het je niet raken. Wat je in een ander bewondert draagt een kwaliteit die ook in jou leeft, nog niet volledig geclaimd maar aanwezig, anders zou je het niet herkennen. Elk oordeel over een ander is een spiegel. De vraag is nooit wat er mis is met die ander, maar altijd: wat wil deze reactie mij laten zien over mezelf?"
    - heading "Jouw schaduwkanten zijn niet je vijanden" [level=3] [ref=e880]
    - paragraph [ref=e881]: "Je Zuidknoop in Kreeft laat zien dat je in vorige ervaringen veel hebt gegeven, veel hebt verzorgd en soms te veel hebt genomen van jezelf. Dat patroon wil groeien naar je Noordknoop: je eigen waarheid eerst voelen, dan delen. De schaduw die soms opkomt: je voelt wat iemand nodig heeft en stopt niet met het zeggen; je geeft meer dan je hebt. De groei ligt in: voelen wat nodig is, het zien, en dan loslaten — niet alles hoeft van jou opgelost te worden. Dit is precies wat je lerend ervaart: je kind voelen, je partner voelen, jezelf voelen, en dan kiezen wat je inbrengt."
    - heading "Jouw zes gaven" [level=3] [ref=e882]
    - paragraph [ref=e883]: "Er is iets wat jou onderscheidt van alles om je heen: zes vermogens die jou in staat stellen om te stoppen, te kijken en anders te kiezen. Intuïtie is het weten dat er is voordat de redenering er is. Verbeeldingskracht is het vermogen om iets te zien dat er nog niet is. Geheugen is het vermogen om patronen te herkennen over tijd. Redeneren is het vermogen om verbanden te leggen. Perceptie is hoe je waarneemt, en hoe je het ziet bepaalt wat je ervaart. Wilskracht is het vermogen om te kiezen in plaats van automatisch te reageren. Deze zes gaven zijn altijd beschikbaar. Ze wachten niet op een goed moment."
    - heading "Hoe jouw zes gaven oplichten in je kaart" [level=3] [ref=e884]
    - paragraph [ref=e885]: Je zes gaven zijn de kracht van je kaart in pure vorm. Hoe bewuster je ze inzet, hoe meer je kaart-energie stroomt.
    - generic [ref=e886]:
      - generic [ref=e887]:
