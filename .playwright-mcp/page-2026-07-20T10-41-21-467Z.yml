        - generic [ref=e433]: "Mededogen en overgave, loslaten. Schaduw: martelaarschap."
    - paragraph [ref=e434]: "De meestergetallen 11 (de ziener), 22 (de meesterbouwer) en 33 (de meesterleraar) dragen een verhoogde trilling van hun basisgetal. Ze brengen meer potentieel, maar vragen ook om meer bewustzijn en innerlijke ontwikkeling. We werken met je officiële geboortenaam zoals geregistreerd op je geboorteakte, niet met een roepnaam of getrouwde naam: dat is de energetische signatuur waarmee je dit leven bent gestart."
    - heading "De vijf kerngetallen" [level=3] [ref=e435]
    - paragraph [ref=e436]: "Het Levenspad, berekend uit je geboortedatum, is de centrale energie van dit leven, je hoofdthema en de les die je bent gekomen om te leren. Het verandert nooit. Het Persoonlijk Jaar, uit je geboortedag, geboortemaand en het huidige jaar, is de energie die dit jaar beschikbaar is, als deel van een negenjarige cyclus. Het Uitdrukkingsgetal, uit je volledige geboortenaam, is hoe je je uitdrukt in de wereld: je talenten en capaciteiten. De Zielenurge, uit de klinkers in je naam, is wat jouw ziel werkelijk verlangt, het meest intieme getal. Het Persoonlijkheidsgetal, uit de medeklinkers, is hoe anderen jou waarnemen voordat ze je echt kennen."
    - generic [ref=e437]:
      - generic [ref=e438]:
        - generic [ref=e439]: Levenspad
        - generic [ref=e440]: "1"
        - generic [ref=e441]: dag 25→7, maand 1, jaar 1973→20→2; 7+1+2 = 10 → 1
