        - generic [ref=e898]: "Geheugen (Mercurius in Schorpioen): je onthout details, patronen, waarom iets zo werkt. Toepassing: deel je kennis; dit is niet arrogantie, het is gift. Je weet dingen over de mind en bewustzijn die anderen helpen."
      - generic [ref=e899]:
