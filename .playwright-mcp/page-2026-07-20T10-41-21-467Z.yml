  - generic [ref=e1034]:
    - generic [ref=e1035]: 13 — Verdieping
    - heading "Waar ga je vanaf hier naartoe?" [level=2] [ref=e1036]:
      - text: Waar ga je
      - emphasis [ref=e1037]: vanaf hier
      - text: naartoe?
    - paragraph [ref=e1038]: Deze Blueprint is een begin. Wat je hebt gelezen is een momentopname van de energetische signatuur die je vanaf je eerste ademhaling met je meedraagt. Het is niet compleet en kan dat ook nooit zijn. Het leven blijft lagen toevoegen.
    - paragraph [ref=e1039]: Dit document is niet bedoeld om in één keer te begrijpen. Laat het op je inwerken. Kom er de komende maanden op terug. Wat nu abstract voelt, kan over drie maanden precies de zin zijn die je nodig hebt, juist nu je in een jaar van nieuw begin staat.
    - generic [ref=e1040]:
      - generic [ref=e1041]:
        - generic [ref=e1042]: Optie 01
        - heading "Progressies en transits" [level=3] [ref=e1043]
        - paragraph [ref=e1044]: Als deze Blueprint resoneerde, is een volgende stap om naar je secundaire progressies en de huidige planeetstanden ten opzichte van je geboortekaart te kijken. Dit laat zien welke thema's nu geactiveerd worden, en kan precies timen wanneer de energie voor je groei het sterkst in je voordeel werkt.
      - generic [ref=e1045]:
        - generic [ref=e1046]: Optie 02
        - heading "Levensboom en 10 Sefirot" [level=3] [ref=e1047]
        - paragraph [ref=e1048]: De Kabbalah-laag in deze Blueprint raakt de oppervlakte. De Levensboom met de tien Sefirot biedt een diepere kaart van hoe jouw ziel door lagen van manifestatie werkt, van bewustzijn naar de tastbare werkelijkheid die je wilt vormgeven.
      - generic [ref=e1049]:
        - generic [ref=e1050]: Optie 03
        - heading "Human Design of Gene Keys" [level=3] [ref=e1051]
        - paragraph [ref=e1052]: Human Design en Gene Keys zijn aanvullende systemen die overlappen met maar ook verschillen van astrologie en numerologie. Ze geven een extra laag informatie over je energetische type en hoe je het beste beslissingen neemt.
    - heading "Hoe je hiervandaan verder gaat" [level=3] [ref=e1053]
    - paragraph [ref=e1054]: Dit document is een startpunt. Wat je ermee doet, elke dag, in kleine momenten, is de echte blauwdruk. Er zijn vier bewegingen die je kunt maken.
    - paragraph [ref=e1055]:
      - strong [ref=e1056]: "Handelen:"
      - text: kies één praktijk uit je Blueprint en doe die vandaag. Niet morgen, niet als je je er klaar voor voelt. Vandaag, klein, concreet. Eén beweging richting je Noordknoop is meer waard dan tien inzichten die je niet leeft.
    - paragraph [ref=e1057]:
      - strong [ref=e1058]: Contempleren
      - text: is niet hetzelfde als denken. Denken gaat over oplossen; contempleren gaat over aanwezig zijn met wat er is. Neem één vraag uit sectie 10, niet om haar te beantwoorden. Draag haar een week met je mee en laat het leven je het antwoord tonen.
    - paragraph [ref=e1059]:
      - strong [ref=e1060]: "Blijf jezelf de juiste vragen stellen:"
      - text: de vragen in dit document zijn niet bedoeld om één keer te lezen. Een vraag die vandaag niets doet, kan over drie maanden precies de zin zijn die alles verschuift. Kom terug, lees opnieuw, kijk wat er nu resoneert.
    - paragraph [ref=e1061]:
      - strong [ref=e1062]: Praat met een mens.
      - text: "AI kan je spiegelen, maar een goed gesprek met iemand die je kent en je durft uit te dagen gaat verder: iemand die niet bevestigt wat je al weet, maar de vraag stelt die je liever vermijdt. De combinatie van dit document plus een levend gesprek is krachtiger dan elk van beide afzonderlijk."
    - heading "Tot slot" [level=3] [ref=e1063]
    - paragraph [ref=e1064]:
      - strong [ref=e1065]: Tot slot.
      - text: "Je bent aan het groeien naar volwassenheid — niet als afstand tot wie je bent, maar als verdieping erin. Je Schorpioen-eneregie wil waarheid; je Steenbok-groei vraagt daarvan om grond eronder. Je bent niet te intens, niet te voelend, niet te veel. Je bent precies goed zoals je bent. Wat je nu mag oefenen: eerst jezelf horen, dan spreken. Rest nemen zonder schuldgevoel. Je kracht gebruiken om grenzen te stellen, niet om alles te veranderen. Dit jaar van loslaten (jaar 9) is geen verlies — het is ruimte maken voor de volgende vrijheid."
    - paragraph [ref=e1066]: "Je kundalini-ontwaking, je bedrijf, je huizen, je reizen, je lichaam dat fit wordt — dit alles groeit niet ondanks je schaduw, maar doordat je hem ziet en kiest anders. Ga zachtjes met jezelf om. De aarde heeft jouw inzicht en jouw wijsheid nodig, niet jouw opgave. De enige vraag die overblijft: waar zeg je vandaag nee, zodat je volgende week volmondig ja kunt zeggen?"
    - heading "Bronnen, verdieping & volgende stappen" [level=3] [ref=e1067]
    - paragraph [ref=e1068]: Dit document is het begin. Niet het einde. Hier zijn richtingen voor wie dieper wil gaan.
