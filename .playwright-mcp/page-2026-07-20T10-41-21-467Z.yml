      - generic [ref=e934]: Simpele woorden kiezen
      - generic [ref=e935]: "Je wilt duidelijk kunnen delen vanuit rust. Oefening: neem één ding wat je weet, en zeg het in drie zinnen. Scoorpioen wil alles begrijpen; Steenbok vraagt: wat is essentieel? Strijd daar, laat details los."
