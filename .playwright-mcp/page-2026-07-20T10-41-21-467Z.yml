    - heading "Opvallende patronen in jouw kaart" [level=3] [ref=e357]
    - paragraph [ref=e358]: "Je kaart wordt gedomineerd door water: vier sterke planeten in Schorpioen (Zon, Maan, Mercurius en bijna alles). Dit maakt je een gevoelskundig, intuïtief wezen. Maar je Ascendant Leeuw en je Noordknoop Steenbok zeggen: dit alles mag en moet zichtbaar worden. Je bent niet gemaakt om stil te zitten met wat je weet."
    - paragraph [ref=e359]: "Opvallend: zowel Mars als Saturn zijn retrograde. Dit vertraagt je, geeft je geduld, maar vraagt ook voorzichtigheid om niet in jezelf in te kromp. Je Chiron retrograde in Ram zit recht tegenover je Noordknoop in Steenbok: je wonde is het niet mogen spreken; je genezingspad is precies spreken – duidelijk, van autoriteit, vanuit rust."
    - paragraph [ref=e360]: "Een tweede patroon: je Huis 4 zit vol (Zon, Maan, Mercurius, Uranus): thuis, basis, fundament, psyche. Dit verklaart waarom je huizen (in Nederland en Spanje) voor jou niet luxe zijn, maar noodzaak – je hebt grond nodig om in jezelf te kunnen voelen. Je Noordknoop in Huis 5 roept je naar creatie, kinderen, zichtbaar spel."
    - paragraph [ref=e361]: "Een derde patroon: je numerologische Levenspad 1 (onafhankelijkheid, voorgaan) botst soms met je Uitdrukkingsgetal 2 (samenwerking, aandacht). Je Zielenurge 11 (intuïtie, inspiratie) wil maar boven, maar het voelt of je jezelf soms pas kan uitdrukken via anderen – vandaar je verlangen om Sean na te volgen. Het echte werk is: je eigen autoriteit erkennen en die zelf incarneren."
    - generic [ref=e362]:
      - generic [ref=e363]:
        - generic [ref=e364]: Cluster Huis 4 (Zon · Maan · Mercurius · Uranus)
        - heading "Het diepe fundament" [level=3] [ref=e365]
        - paragraph [ref=e366]: "Vier planeten in je vierde huis zeggen dat je alles beleeft via je innerlijk landschap, je psyche, je thuisgevoel. Dit is waar je kracht zit, maar ook waar je jezelf kan opsluiten. Je Uranus hier geeft onverwachte inzichten over wie je bent. Je verlangen naar mooie, heldere huizen is niet oppervlakkig: het is je manier om je innerlijke ordening ook uiterlijk vorm te geven. Dit helpt je."
      - generic [ref=e367]:
        - generic [ref=e368]: As Noordknoop–Zuidknoop (Steenbok 5 — Kreeft 11)
        - heading "Van voelen naar bouwen" [level=3] [ref=e369]
        - paragraph [ref=e370]: "Je Zuidknoop in Kreeft zit in Huis 11: je hebt al veel geleerd over emotionele verbinding, gezin, het zogen voor anderen. Dat was vorig leven, zo voelt het. Je Noordknoop in Steenbok (Huis 5) vraagt je om daaruit op te staan en je eigen ding te doen: creëren, leiden, duidelijk zijn wie je bent. Dit is een sterke as in je kaart. Het verklaart waarom je voelt dat je 'naar de volgende level' moet – je voelt aan dat je klaar bent met puur voelen en geven."
  - generic [ref=e371]:
    - generic [ref=e372]: 05 — Noord- & Zuidknoop
    - heading "Van Kreeft naar Steenbok" [level=2] [ref=e373]:
      - text: Van Kreeft
      - emphasis [ref=e374]: naar Steenbok
    - paragraph [ref=e375]: "De Noord- en Zuidknoop zijn geen planeten. Het zijn twee wiskundige punten waar de baan van de Maan de ecliptica kruist. Ze staan altijd exact tegenover elkaar, op 180 graden afstand: altijd een as, altijd een spanning tussen twee richtingen. De Zuidknoop laat zien waar je vandaan komt, wat je al weet, wat je bijna reflexmatig doet en wat veilig voelt. De Noordknoop laat zien waar je naartoe groeit, wat nieuw aanvoelt, soms ongemakkelijk, en precies daar ligt de groei van dit leven."
    - paragraph [ref=e376]: De bedoeling is niet om de Zuidknoop achter te laten. Zie de Zuidknoop als de wortels van een boom en de Noordknoop als de richting waarin de takken groeien. Zonder wortels kan een boom niet groeien; zonder groei hebben de wortels geen bestemming. De spanning die je voelt wanneer je richting je Noordknoop beweegt, betekent niet dat je de verkeerde kant op gaat. Vaak betekent het dat je een nieuwe versie van jezelf ontmoet.
    - paragraph [ref=e377]: "Je herkent de Zuidknoop aan wat moeiteloos lijkt te gaan. Het voelt vertrouwd, je hoeft er nauwelijks over na te denken, en onder druk val je erop terug. De Zuidknoop is niet fout; veel van je natuurlijke kracht leeft hier. Je herkent de Noordknoop aan een gevoel van onzekerheid of weerstand. Het kan voelen als \"dit ben ik niet\" of \"wie ben ik om dit te doen\". Juist daarom is het zo waardevol: het wijst naar waar groei en vervulling plaatsvinden."
    - paragraph [ref=e378]: "Je Zuidknoop in Kreeft in huis 11 toont je vertrouwde patroon: je bent iemand die zich vaak volledig inzet voor groepen, voor 'wij' in plaats van 'ik'. Je gevoelens bepalen wat je doet, en je hebt een sterke drang om ervoor te zorgen dat iedereen zich veilig voelt. Dat voelt natuurlijk en warm. Maar je merkt ook dat dit patroon je soms 'vast' zet: je geeft veel, je luistert, je voelt, en dan raak je jezelf kwijt in de behoefte van anderen."
    - paragraph [ref=e379]: "Je Noordknoop in Steenbok in huis 5 nodigt je uit een andere kant op te gaan: naar duidelijkheid, structuur en je eigen schepping. Dit gaat niet over alleen jezelf zetten—het gaat over dat je leert jezelf serieus nemen, je grenzen stellen en wat jij wilt uitbrengen in de wereld verankeren. Je kundalini-ontwaking die je noemt, je wens om 'vanuit simpelheid' je kennis te delen, je bedrijf SZINN dat groeit: dat is allemaal Steenbok-energie. Verantwoordelijkheid, duidelijk spreken, bouwen wat blijft."
    - generic [ref=e380]:
      - generic [ref=e381]:
        - generic [ref=e382]: Zuidknoop — Oorsprong
        - heading "Kreeft · Huis 11" [level=3] [ref=e383]
        - paragraph [ref=e384]: "Kreeft in huis 11: je voelt goed aan wat anderen nodig hebben en je zorgt ervoor dat iedereen zich ondersteund voelt. Maar dit patroon voelt op den duur beperkend als je jezelf opoffert of je eigen grens niet bewaakt. Je weet zelf dat je soms 'niet kunt stoppen met zeggen' wat je ziet—dat komt uit deze oude beweging, alsof je moet helen wat je voelt."
      - generic [ref=e385]:
        - generic [ref=e386]: Noordknoop — Groeirichting
        - heading "Steenbok · Huis 5" [level=3] [ref=e387]
        - paragraph [ref=e388]: "Steenbok in huis 5: leer jezelf als schepper serieus nemen. Maak wat jij wilt maken—je bedrijf, je uitleg, je kennis—en zeg dat van hieruit rust en ontspanning. Je wordt uitgenodigd om niet meer alleen te zorgen dat anderen veilig voelen, maar om zelf duidelijk en verantwoord te staan voor wat je doet en zegt. Dit is je groeirichting; de concrete stap is elke dag spreken en delen vanuit jezelf, niet vanuit wat je denkt dat ander nodig heeft."
    - heading "Chiron in Ram in Huis 10" [level=3] [ref=e389]
    - paragraph [ref=e390]: "Je Chiron in Ram in huis 10, retrograde, raakt iets dieps aan: je hebt ergens geleerd dat je eigen wilskracht, je 'nee' zeggen of je eigen voortgang, niet veilig is—of dat het egocentrisch oogt. De wond zit in het moeten presteren en tegelijk bang zijn voor je eigen kracht. Maar Chiron heelt dit juist: als je durft jezelf als autoriteit in te nemen, als je durft te zeggen wat je weet en niet meer alleen luistert naar wat buiten je komt, dan wordt die wond je gave. Je wordt iemand die anderen toestemming geeft om in hun eigen kracht te staan—omdat jij het doet."
  - generic [ref=e391]:
    - generic [ref=e392]: 06 — Numerologie
    - heading "De getallen van Elly Elizabeth Korving" [level=2] [ref=e393]:
      - text: De
      - emphasis [ref=e394]: getallen
      - text: van Elly Elizabeth Korving
    - paragraph [ref=e395]: Pythagorisch systeem · Berekend vanuit 25 oktober 1973 en je geboortenaam · Meestergetallen niet gereduceerd
    - paragraph [ref=e396]: "Numerologie is de studie van de symbolische en energetische betekenis van getallen. Het systeem dat wij gebruiken is gebaseerd op de leer van Pythagoras: elk getal van 1 tot en met 9 draagt een eigen energie, een eigen karakter, een eigen beweging. Het voorspelt niet wat er gaat gebeuren; het maakt zichtbaar welke energieën en patronen actief zijn in jouw leven. Getallen liegen niet. Ze spiegelen."
