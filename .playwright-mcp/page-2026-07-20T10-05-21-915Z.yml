    - paragraph [ref=e743]: Dit patroon is als een QR-code van jouw ziel. Het is niet bedoeld om met het hoofd te begrijpen, maar om met het lichaam te voelen. Adem er zes seconden op in, zes seconden uit. Kijk wat er beweegt.
    - paragraph [ref=e744]: "Sacred geometry is niet iets wat je begrijpt. Het is iets wat je herkent. Jouw mandala is geen afbeelding om te ontcijferen, maar een frequentie om te herkennen. Kijk ernaar zoals je naar de zon kijkt: niet om te analyseren, maar om te ontvangen."
    - blockquote [ref=e745]: Ademreeks 6 · 6 · 6 · 6 — zes seconden in, zes seconden vasthouden, zes seconden uit, zes seconden stil.
    - paragraph [ref=e746]: Het laat je adem volledig worden, kalmeert je zenuwstelsel en brengt je terug naar stilte. Hang haar op een plek waar je haar dagelijks ziet. Gebruik haar op momenten van keuze of twijfel, niet om een antwoord te vinden maar om terug te keren naar jezelf.
  - generic [ref=e747]:
