    - heading "Levenspad 1 — De Leider & Pionier" [level=3] [ref=e462]
    - paragraph [ref=e463]: "Je levenspad is 1, het getal van de pionier en de leider. Het kernwoord is onafhankelijkheid: zelf een weg banen, iets beginnen wat er nog niet was, vertrouwen op je eigen richting in plaats van op wat anderen al deden. In je kaart zie je dit terug in je Ram-Midhemel (je carrièrerichting is van nature initiërend en baanbrekend) en je Leeuw-Ascendant (je wilt gezien worden en van nature vooroplopen). De schaduwkant van een 1 is egocentrisme: zo gefocust zijn op je eigen weg dat je de mensen om je heen uit het oog verliest."
    - paragraph [ref=e464]: "Je uitdrukkingsgetal is 2, het getal van samenwerking en verbinding. Dat maakt een interessante spanning met je 1: je bent van nature een pionier, maar je uitdrukking naar buiten toe vraagt om samenwerking en afstemming op anderen. Precies dat zie je terug in je eigen woorden over szinn: je wilt iets baanbrekends bouwen (de 1), maar wel vanuit verbinding en delen met anderen (de 2) — kennis overdragen, guides laten meedraaien, mensen helpen zichzelf beter te begrijpen."
    - heading "Persoonlijk Jaar 9 (2026)" [level=3] [ref=e465]
    - paragraph [ref=e466]: "2026 is voor jou een Persoonlijk Jaar 9: een jaar van afronden en loslaten. Een 9-jaar vraagt om te oogsten wat er is opgebouwd, en om ruimte te maken door los te laten wat niet meer past — voordat er in het jaar erna weer iets nieuws kan beginnen. Dit sluit aan bij je Zuidknoop in Kreeft, elfde huis: het oude patroon van zorgen-voor-de-groep-om-erbij-te-horen mag dit jaar meer ruimte maken voor iets wat echt van jou is."
    - paragraph [ref=e467]: "In je eigen woorden zie je deze afrondende energie al terug: je wilt dat szinn.ai staat, je reizen geboekt, je inkomen stabiel, je communicatie verbeterd — allemaal dingen die om afronding en op-orde-brengen vragen. Je persoonlijke maanden laten zien hoe dat verder gaat: na de afrondende maanden komt er ruimte voor een nieuw begin."
    - generic [ref=e469]:
      - generic [ref=e470]: De cyclus van 2026
      - heading "Van afronden naar een nieuw begin" [level=3] [ref=e471]
      - paragraph [ref=e472]: "Juli 2026 begint met persoonlijke maand 7: een maand van verdieping en reflectie, waarin je meer naar binnen kijkt dan naar buiten. Augustus brengt persoonlijke maand 8, gericht op resultaat en op-orde-brengen van wat je hebt opgebouwd. September, met persoonlijke maand 9, is de afronding: loslaten wat klaar is, ruimte maken. Dan draait het jaar om: oktober begint met persoonlijke maand 1, een nieuw begin, een frisse start voor iets waar jij het voortouw in neemt. November volgt met maand 2, waarin samenwerking en verbinding met anderen centraal komen. En december sluit dit stuk van de cyclus af met maand 3, een maand van uiten, delen en zichtbaar worden met wat er in juli tot en met november is gegroeid."
  - generic [ref=e473]:
    - generic [ref=e474]: 07 — Kabbalah & Tikkun
    - heading "De zielstaak van Elly Elizabeth Korving" [level=2] [ref=e475]:
      - text: De
      - emphasis [ref=e476]: zielstaak
      - text: van Elly Elizabeth Korving
    - paragraph [ref=e477]: "Tikkun is een Hebreeuws woord. Het betekent correctie, herstel, heelmaking. In de Kabbalistieke traditie verwijst het naar de specifieke taak die jouw ziel op zich heeft genomen in dit leven: wat is er gekomen om te helen, te leren en te transformeren? Het is geen straf en geen gebrek. Het is een richting, een keuze die je ziel maakte voordat je hier aankwam. Het is de reden waarom bepaalde patronen steeds terugkeren, totdat je erdoorheen kijkt."
    - paragraph [ref=e478]: Waar numerologie je vertelt welke energie je meebrengt, en astrologie laat zien hoe die energie zich ontvouwt, gaat Tikkun een laag dieper. Het vraagt niet wie je bent of hoe je functioneert. Het vraagt waarom je hier bent, op het niveau van de ziel.
    - paragraph [ref=e479]: "Tikkun beschrijft drie dingen samen. De kernwond is het thema dat het diepst zit, dat het vroegst verscheen en dat het langst heeft doorgewerkt: de plek waar jouw pijn en jouw gave hetzelfde adres delen. Het herhalingspatroon laat zien welke thema's steeds terugkeren in relaties, werk en keuzes. En de zielstaak is de richting: wat je het hardst hebt moeten leren, is vaak precies wat je later het diepst kunt doorgeven. De bedoeling is niet om je Tikkun op te lossen, maar om ermee te leren dansen."
    - generic [ref=e481]:
      - generic [ref=e482]: Kernthema
      - heading "Zorgen zonder jezelf te verliezen" [level=3] [ref=e483]
      - paragraph [ref=e484]: "Je Zon en Maan staan beide in Schorpioen, in je vierde huis — vlak bij elkaar, bijna als een Nieuwe Maan. Dat geeft een intense, diepe binnenwereld: je voelt dingen sterk en je thuisbasis is waar die diepte mag bestaan. Je Zuidknoop in Kreeft, elfde huis, en Saturnus retrograde net daarnaast, laten zien waar die diepte vaak naartoe ging: zorgen voor de mensen in je kring, verantwoordelijkheid nemen voor hoe een groep zich voelt. Het kernthema is leren zorgen vanuit vrije keuze, niet vanuit plicht — zodat je diepte een bron blijft in plaats van een put die leegraakt."
    - generic [ref=e486]:
      - generic [ref=e487]: Groei
      - heading "Je eigen fundament bouwen" [level=3] [ref=e488]
      - paragraph [ref=e489]: "De groei ligt in je Noordknoop, Steenbok in je vijfde huis: zelf iets bouwen, met structuur en volharding, vanuit je eigen creativiteit. Je Midhemel in Ram versterkt dit — je carrièrerichting is van nature baanbrekend en initiërend. In je eigen woorden herken je dit al: szinn.ai neerzetten, target halen, een structuur die staat en loopt. De groei zit in dat vasthouden en afmaken, ook wanneer focus en volhouden — iets wat je zelf als je grootste uitdaging noemt — lastig wordt."
    - generic [ref=e491]:
      - generic [ref=e492]: Zielstaak
      - paragraph [ref=e493]: "De zielstaak brengt beide kanten samen: zorgen voor anderen vanuit een fundament dat eerst van jezelf is. Je Mercurius in Schorpioen (vierde huis) geeft je het vermogen om diep te doorvoelen wat er speelt, en je Leeuw-Ascendant geeft je de wens om gezien en gehoord te worden met wat je te zeggen hebt. Chiron in Ram, tiende huis, retrograde, wijst naar de weg daarheen: een stem worden die vanuit rust vertelt wat ze weet — precies zoals je het zelf beschrijft wanneer je naar Sean kijkt. Niet zorgen omdat het moet, maar delen omdat het van binnenuit komt."
    - 'heading "Retrograde planeten: innerlijke verwerking" [level=3] [ref=e494]'
    - paragraph [ref=e495]: "In je kaart staan drie planeten retrograde: Mars in Stier (tiende huis), Saturnus in Kreeft (elfde huis) en Chiron in Ram (tiende huis). Dat is een flink deel van je energie die eerst naar binnen gaat voordat die naar buiten zichtbaar wordt. Mars retrograde kan betekenen dat je drive en doorzettingsvermogen er wel zijn, maar dat ze soms lastiger naar buiten te brengen zijn — iets wat aansluit bij wat je zelf benoemt als je grootste uitdaging: focus en volhouden in het nu. Saturnus retrograde in je elfde huis maakt het gevoel van verantwoordelijkheid voor de groep extra intern verwerkt — een plicht die je jezelf oplegt, meer dan een verwachting van buiten. En Chiron retrograde in je tiende huis betekent dat de heling van je wond rond zichtbaarheid en leiderschap grotendeels een innerlijk proces is, wat ook kan verklaren waarom je zelf aangeeft dat je iemand naast je zou willen hebben die je daarbij helpt."
  - generic [ref=e496]:
    - generic [ref=e497]: 08 — Sacred Geometry
    - heading "De Mandala van Elly Elizabeth Korving" [level=2] [ref=e498]:
