      - text: Persoonlijk Jaar — In 2026 doorloop je persoonlijke maanden die van afronden (7, 8, 9) naar een nieuwe start bewegen (1, 2, 3) — precies het ritme van sluiten en beginnen dat je nu voelt.
      - text: "De praktijken hieronder richten zich op waar de meeste beweging mogelijk is. Voor jou is dat nu vooral:"
