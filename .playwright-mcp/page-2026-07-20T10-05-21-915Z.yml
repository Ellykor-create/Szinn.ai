  - generic [ref=e779]:
    - generic [ref=e780]: 10 — Reflectievragen
    - heading "10 journaling vragen" [level=2] [ref=e781]:
      - text: "10"
      - emphasis [ref=e782]: journaling
      - text: vragen
    - paragraph [ref=e783]: Geen informatie meer. Alleen jij en de vragen. Lees elke vraag langzaam en wacht op wat er als eerste opkomt, niet op wat logisch klinkt. Schrijf het op papier, niet in je hoofd. Er gebeurt iets anders als je schrijft.
    - list [ref=e784]:
      - listitem [ref=e785]:
        - generic [ref=e786]: "1"
        - text: Wanneer voel je dat je zorgt vanuit liefde, en wanneer voel je dat het meer een plicht is geworden die je van jezelf verlangt?
      - listitem [ref=e787]:
        - generic [ref=e788]: "2"
        - text: Wat zou het voor jou betekenen om je kennis te delen vanuit rust in plaats van vanuit inspanning?
      - listitem [ref=e789]:
        - generic [ref=e790]: "3"
        - text: Welke stap zou je vandaag kunnen zetten om structuur te geven aan iets wat nu nog vooral in je hoofd of hart leeft?
      - listitem [ref=e791]:
        - generic [ref=e792]: "4"
        - text: Wat heb je nodig om vaker te voelen dat je bewust creëert, in plaats van dat het leven je overkomt?
      - listitem [ref=e793]:
        - generic [ref=e794]: "5"
        - text: Wat herken je in jezelf wanneer je bewondering voelt voor iemand als Sean, die vanuit rust over zijn kennis vertelt?
      - listitem [ref=e795]:
        - generic [ref=e796]: "6"
        - text: Wat gebeurt er in je lijf en je adem op het moment dat focus en volhouden in het nu lastig worden?
      - listitem [ref=e797]:
        - generic [ref=e798]: "7"
        - text: Wie zou naast je kunnen staan, en wat zou die persoon je geven dat je nu nog mist?
      - listitem [ref=e799]:
        - generic [ref=e800]: "8"
        - text: Wat betekenen vrijheid en creatie voor jou heel concreet, in je dagelijks leven tussen Nederland en Spanje?
      - listitem [ref=e801]:
        - generic [ref=e802]: "9"
        - text: Waar in je leven ben je klaar om iets af te ronden, zodat er ruimte ontstaat voor iets nieuws?
      - listitem [ref=e803]:
