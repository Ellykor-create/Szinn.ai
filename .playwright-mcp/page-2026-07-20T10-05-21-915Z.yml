    - heading "Opvallende patronen in jouw kaart" [level=3] [ref=e357]
    - paragraph [ref=e358]: "Het meest opvallende in je kaart is de ophoping van planeten in huis 4: je Zon, Maan en Mercurius staan alle drie in Schorpioen, en Uranus staat er ook, in Weegschaal. Dat maakt huis 4 — thuis, wortels, je innerlijke fundament — tot een zwaartepunt van je hele kaart. Alles wat met binnenwereld, familie en een veilige basis te maken heeft, is bij jou geen bijzaak maar de kern."
    - paragraph [ref=e359]: "Tegenover deze ophoping in huis 4 staat een tweede cluster in huis 10: je Mars in Stier, je Midhemel in Ram en Chiron in Ram. Dit is het huis van werk, richting en hoe je gezien wordt in de wereld. De twee clusters samen vertellen een verhaal van een leven dat zich afspeelt tussen een diepe, persoonlijke binnenwereld en een zichtbare, actieve buitenwereld — en van de weg die je zoekt om die twee met elkaar te verbinden."
    - paragraph [ref=e360]: "Je knopen-as loopt van Kreeft in huis 11 (Zuidknoop) naar Steenbok in huis 5 (Noordknoop). Dat is de as tussen meebewegen met de groep of de emoties van anderen (huis 11, Kreeft) en je eigen werk, creatie en gezag neerzetten (huis 5, Steenbok). Deze as ligt in het verlengde van de spanning tussen huis 4 en huis 10: steeds gaat het om de vraag hoe je vanuit je diepe, gevoelige binnenwereld iets eigens en zichtbaars kunt bouwen."
    - paragraph [ref=e361]: "Drie planeten staan retrograde in je kaart: Mars, Saturnus en Chiron. Retrograde planeten werken vaak meer van binnenuit dan naar buiten — ze vragen eerst om innerlijke verwerking voordat ze zich laten zien in actie. Dat sluit aan bij je Levenspad 1 (een pionier die zijn eigen pad gaat) en je Persoonlijk Jaar 9 in 2026 (afronden): de kaart en de cijfers wijzen allebei naar een moment waarop je eerst iets in jezelf voltooit, voordat je met volle kracht naar buiten treedt."
    - generic [ref=e362]:
      - generic [ref=e363]:
        - generic [ref=e364]: Cluster Huis 4 (Zon · Maan · Mercurius · Uranus)
        - heading "Je diepe, gevoelige fundament" [level=3] [ref=e365]
        - paragraph [ref=e366]: "Vier planeten in huis 4 maken van je thuisbasis en je innerlijke wereld het zwaartepunt van je kaart. Zon, Maan en Mercurius in Schorpioen brengen intensiteit, gevoel en scherp inzicht samen op dit terrein; Uranus in Weegschaal voegt daar een verlangen aan toe naar vernieuwing en balans in hoe je 'thuis' vormgeeft. Dit verklaart mogelijk waarom een eigen, mooie plek — zoals je huizen in Nederland en Spanje — zo veel voor je betekent: het is niet zomaar wonen, het is je fundament zichtbaar maken."
      - generic [ref=e367]:
        - generic [ref=e368]: Cluster Huis 10 (Mars · Midhemel · Chiron)
        - heading "Zichtbaar worden vanuit je eigen tempo" [level=3] [ref=e369]
        - paragraph [ref=e370]: "Mars retrograde, je Midhemel en Chiron staan alle drie in huis 10, het huis van werk en positie in de wereld. Mars retrograde in Stier vraagt om een eigen, langzamer tempo van handelen in plaats van het tempo van buitenaf over te nemen. Chiron hier, in Ram, wijst op een gevoelige plek rond gezien en gehoord worden als leider — iets dat kan helen door precies dat te doen waar je nu al naar verlangt: vanuit rust vertellen wat je weet."
  - generic [ref=e371]:
    - generic [ref=e372]: 05 — Noord- & Zuidknoop
    - heading "Van Kreeft naar Steenbok" [level=2] [ref=e373]:
      - text: Van Kreeft
      - emphasis [ref=e374]: naar Steenbok
    - paragraph [ref=e375]: "De Noord- en Zuidknoop zijn geen planeten. Het zijn twee wiskundige punten waar de baan van de Maan de ecliptica kruist. Ze staan altijd exact tegenover elkaar, op 180 graden afstand: altijd een as, altijd een spanning tussen twee richtingen. De Zuidknoop laat zien waar je vandaan komt, wat je al weet, wat je bijna reflexmatig doet en wat veilig voelt. De Noordknoop laat zien waar je naartoe groeit, wat nieuw aanvoelt, soms ongemakkelijk, en precies daar ligt de groei van dit leven."
    - paragraph [ref=e376]: De bedoeling is niet om de Zuidknoop achter te laten. Zie de Zuidknoop als de wortels van een boom en de Noordknoop als de richting waarin de takken groeien. Zonder wortels kan een boom niet groeien; zonder groei hebben de wortels geen bestemming. De spanning die je voelt wanneer je richting je Noordknoop beweegt, betekent niet dat je de verkeerde kant op gaat. Vaak betekent het dat je een nieuwe versie van jezelf ontmoet.
    - paragraph [ref=e377]: "Je herkent de Zuidknoop aan wat moeiteloos lijkt te gaan. Het voelt vertrouwd, je hoeft er nauwelijks over na te denken, en onder druk val je erop terug. De Zuidknoop is niet fout; veel van je natuurlijke kracht leeft hier. Je herkent de Noordknoop aan een gevoel van onzekerheid of weerstand. Het kan voelen als \"dit ben ik niet\" of \"wie ben ik om dit te doen\". Juist daarom is het zo waardevol: het wijst naar waar groei en vervulling plaatsvinden."
    - paragraph [ref=e378]: "Je Zuidknoop staat in Kreeft, in je elfde huis. Dat is het vertrouwde gebied: zorgen voor de mensen om je heen, aanvoelen wat een groep nodig heeft, en je thuis voelen doordat je gewenst en nodig bent binnen een kring van mensen. Saturnus staat retrograde vlak in de buurt van deze knoop, in hetzelfde teken en huis. Dat maakt het patroon extra vertrouwd: het voelt niet als een keuze maar als een plicht die je al vroeg hebt geleerd — voor anderen zorgen, verantwoordelijkheid nemen voor het gevoel van de groep, jezelf bewijzen door bruikbaar te zijn."
    - paragraph [ref=e379]: "Je Noordknoop ligt in Steenbok, in je vijfde huis — het huis van creatie, plezier en persoonlijke expressie. De groeirichting vraagt je om niet alleen te zorgen voor wat de groep nodig heeft, maar om zelf iets te bouwen: je eigen werk, je eigen structuur, je eigen stem, met discipline en volharding. In je eigen woorden zie je dit al gebeuren — de wens om 'iedere dag te praten en te delen', om een bedrijf als szinn neer te zetten met een duidelijke structuur. Dat is precies deze beweging: van zorgen voor de groep naar het zelf vormgeven van iets wat van jou is."
    - generic [ref=e380]:
      - generic [ref=e381]:
        - generic [ref=e382]: Zuidknoop — Oorsprong
        - heading "Kreeft · Huis 11" [level=3] [ref=e383]
        - paragraph [ref=e384]: "Het vertrouwde patroon van je Zuidknoop (Kreeft, elfde huis) is zorgen voor de mensen om je heen: aanvoelen wat een groep nodig heeft, je nuttig maken, je thuis voelen door erbij te horen. Saturnus retrograde zit dicht bij deze knoop, wat het patroon zwaarder en plichtmatiger kan maken — als een taak die je al vroeg op je hebt genomen. Dit patroon voedt je niet meer op het moment dat zorgen voor anderen een automatisme wordt waarin je jezelf verliest, of wanneer je merkt dat je geeft omdat het moet, niet omdat het uit vrije keuze komt."
      - generic [ref=e385]:
        - generic [ref=e386]: Noordknoop — Groeirichting
        - heading "Steenbok · Huis 5" [level=3] [ref=e387]
        - paragraph [ref=e388]: "Je Noordknoop in Steenbok, vijfde huis, wijst naar een andere richting: je eigen creatie vormgeven, met structuur en volharding, vanuit je eigen autoriteit in plaats van vanuit de groep. Een concrete stap die aansluit bij wat je zelf al benoemt: elke dag iets delen van je kennis, en daar een vaste vorm aan geven — niet als losse momenten, maar als een bouwwerk dat van jou is, zoals je dat nu al doet met szinn."
    - heading "Chiron in Ram in Huis 10" [level=3] [ref=e389]
    - paragraph [ref=e390]: "Chiron staat retrograde in Ram, in je tiende huis — het huis van je publieke rol en richting in de wereld. De wond zit in het jezelf durven laten zien en claimen wie je bent, juist op het podium waar je gezien wordt: leiding nemen, een eigen richting kiezen, zonder je aan te passen aan wat anderen verwachten. Omdat Chiron retrograde staat, is veel van dat helingsproces eerst iets wat vanbinnen gebeurt, voordat het naar buiten zichtbaar wordt. De gave die hieruit kan groeien is precies wat je zelf beschrijft als bewondering voor Sean: iemand worden die vanuit rust en ontspanning vertelt wat ze weet, en daarmee andere mensen helpt hun eigen focus en richting te vinden."
  - generic [ref=e391]:
    - generic [ref=e392]: 06 — Numerologie
    - heading "De getallen van Elly Elizabeth Korving" [level=2] [ref=e393]:
      - text: De
      - emphasis [ref=e394]: getallen
      - text: van Elly Elizabeth Korving
    - paragraph [ref=e395]: Pythagorisch systeem · Berekend vanuit 25 oktober 1973 en je geboortenaam · Meestergetallen niet gereduceerd
    - paragraph [ref=e396]: "Numerologie is de studie van de symbolische en energetische betekenis van getallen. Het systeem dat wij gebruiken is gebaseerd op de leer van Pythagoras: elk getal van 1 tot en met 9 draagt een eigen energie, een eigen karakter, een eigen beweging. Het voorspelt niet wat er gaat gebeuren; het maakt zichtbaar welke energieën en patronen actief zijn in jouw leven. Getallen liegen niet. Ze spiegelen."
