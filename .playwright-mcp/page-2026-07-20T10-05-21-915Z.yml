        - text: Wat zou je durven zeggen als je volledig vrij zou spreken vanuit je eigen kennis en zelfvertrouwen?
  - generic [ref=e805]:
    - generic [ref=e806]: 11 — Werken met de energie
    - heading "Jouw ritme" [level=2] [ref=e807]:
      - text: Jouw
      - emphasis [ref=e808]: ritme
    - paragraph [ref=e809]: Jouw dagelijkse en seizoensritme op basis van jouw kaart.
    - paragraph [ref=e810]: Je bent geen machine. Een machine werkt elke dag hetzelfde, dezelfde input, dezelfde output, zonder ritme, zonder seizoen, zonder eb en vloed. Jij bent aarde, vuur, ether, lucht en water. En water beweegt in cycli. Het stijgt en daalt, vult en trekt zich terug, is soms helder en soms troebel. Niet omdat er iets mis is, maar omdat dat de natuur is van levende energie.
    - heading "De maan als kompas" [level=3] [ref=e811]
    - paragraph [ref=e812]: Van alle cycli die het leven structureren is de maancyclus de meest directe en meest persoonlijk voelbare. De maan beweegt het water van de oceanen, en jouw lichaam bestaat grotendeels uit water. De cyclus duurt ongeveer negenentwintig en een halve dag en doorloopt vier hoofdfasen die elk een eigen energiekwaliteit dragen.
