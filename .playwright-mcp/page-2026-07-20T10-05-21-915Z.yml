  - generic [ref=e135]:
    - generic [ref=e136]: 01 — Visie & Missie
    - heading "Jij bent de blauwdruk." [level=2] [ref=e137]:
      - text: Jij bent
      - emphasis [ref=e138]: de blauwdruk.
    - heading "Visie" [level=3] [ref=e139]
    - paragraph [ref=e140]: Een wereld waarin mensen leven vanuit wie ze werkelijk zijn. Niet vanuit conditionering. Niet vanuit angst. Niet vanuit wat anderen van hen verwachten of wat het systeem van hen vraagt. Maar vanuit de unieke blauwdruk die elk mens bij geboorte meedraagt, de energetische handtekening van wie jij bent, los van alles wat er daarna bovenop is gestapeld.
    - paragraph [ref=e141]: Een mens die leeft vanuit zijn eigen blauwdruk verandert de wereld om zich heen. Niet via grote gebaren of revolutie van buiten, maar via de stille, fundamentele verschuiving die plaatsvindt wanneer iemand stopt met overleven en begint met leven. Een mens in lijn met zichzelf geeft anders, leidt anders, bemint anders, creëert anders. Vanuit overvloed in plaats van tekort. Vanuit bewustzijn in plaats van angst. Vanuit verbinding in plaats van behoefte.
    - blockquote [ref=e142]: "\"Als genoeg mensen herinneren wie ze zijn, verandert de wereld om ons heen vanzelf.\""
    - heading "Missie" [level=3] [ref=e143]
    - paragraph [ref=e144]: SZINN bestaat om mensen te helpen zichzelf te herinneren. Niet leren. Niet worden. Herinneren, want wat jij in dit document tegenkomt is geen nieuwe informatie. Het is een spiegel die laat zien wat er al in jou zit, wat er altijd al is geweest, onder de conditionering, onder de patronen, onder het verhaal dat anderen over jou hebben gebouwd en dat jij op een gegeven moment als je eigen waarheid bent gaan dragen.
    - heading "De vier bewegingen" [level=3] [ref=e145]
    - paragraph [ref=e146]: SZINN begeleidt die herinnering via vier bewegingen die samen de kern vormen van alles wat dit Blueprint doet. Herkenning, het moment dat je een patroon ziet, niet als iets wat je overkomt maar als iets wat je draait. Zodra je ernaar kijkt in plaats van erin te staan, ontstaat er keuze. En keuze is het begin van vrijheid.
    - paragraph [ref=e147]: Helderheid, niet de helderheid van alle antwoorden weten, maar de helderheid van weten wie je bent. Los van wat je doet, los van wat anderen van je denken, los van de rollen die je draagt. Helderheid over jouw energie, jouw kwaliteiten, jouw schaduwkanten en de richting die jouw groei vraagt.
    - paragraph [ref=e148]: Richting, geen bestemming, maar een kompasrichting. Een gevoel van bewegen vanuit alignment in plaats van vanuit reactie. Wanneer je weet wie je bent en waar je staat, wordt de volgende stap vanzelf zichtbaar.
    - paragraph [ref=e149]: Integratie, het sluitstuk en tegelijkertijd het moeilijkste. Kennis is niet genoeg. Integratie is het moment dat inzicht daadwerkelijk gedrag verandert. Dat je niet alleen begrijpt maar leeft. Niet alleen weet maar belichaamt.
    - paragraph [ref=e150]: De naam SZINN draagt drie lagen die de kern van dit systeem vormen. Sin is het sympathische zenuwstelsel in overdrive, de masculiene energie van structuur en kracht die doorslaat naar stress en burnout. Zin is het parasympathische zenuwstelsel in balans, de feminiene energie van ontvangen en creatie. Sinn is de bewuste beweging tussen beide, de kinderlijke creatieve energie die ontstaat wanneer je leert dansen tussen masculien en feminien in plaats van vast te zitten in één kant. Dit is geen spiritueel concept. Dit is biologie. En het maakt de methode toegankelijk voor iedereen.
    - paragraph [ref=e151]: "Deze Blueprint is geen voorspelling en geen oordeel. Het is een spiegel. Hij laat zien wat er al in je aanwezig is: patronen die zich herhalen, krachten die wachten om bewust te worden ingezet, en een richting die jouw ziel al kent. De vraag is niet of deze dingen in jou zitten. De vraag is of jij klaar bent om ze te herkennen."
