[build]
  functions = "netlify/functions"
  publish   = "."
  command   = "npm install"

[build.environment]
  NODE_VERSION = "22"

[functions]
  node_bundler = "esbuild"

# Background function: draait de blueprint-pipeline (max 15 min, vereist Netlify Pro).
# Chromium wordt niet gebundeld maar meegekopieerd; de templates leest de renderer
# van schijf en moeten dus expliciet mee in het function-pakket.
[functions."generate-blueprint-background"]
  external_node_modules = ["@sparticuz/chromium", "puppeteer-core"]
  included_files = ["templates/*.html"]

# De api-functie rendert de demo-blueprint bij het inloggen; de templates
# moeten dus ook in dit function-pakket meegekopieerd worden.
[functions."api"]
  included_files = ["templates/*.html"]

# Ingeplande functie: verstuurt cadeau-e-mails op hun verzenddatum (dagelijks 09:00 UTC).
[functions."process-gifts"]
  schedule = "0 9 * * *"

# ── Schone portal- en cadeau-URL's (geen .html) ──────────────────────────────
[[redirects]]
  from = "/portaal"
  to = "/szinn-portal/pages/dashboard.html"
  status = 200
[[redirects]]
  from = "/portaal/inloggen"
  to = "/szinn-portal/pages/login.html"
  status = 200
[[redirects]]
  from = "/portaal/vragenlijst"
  to = "/szinn-portal/pages/questionnaire.html"
  status = 200
[[redirects]]
  from = "/portaal/blueprint"
  to = "/szinn-portal/pages/blueprint-viewer.html"
  status = 200
[[redirects]]
  from = "/cadeau"
  to = "/szinn-portal/pages/gift.html"
  status = 200
[[redirects]]
  from = "/cadeau/verzilveren"
  to = "/intake/index.html"
  status = 302

